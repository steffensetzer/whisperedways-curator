        // ausgefüllte Stopp im chronologischen Tagesablauf wird als Highlight verwendet (vorher
        // war es t.stopps[0], also der erste Stopp im Original-Array, was nach der Mix-Restrukturierung
        // nicht mehr zwingend der chronologisch erste Stopp ist).
        tag_highlight:(()=>{
          const sorted=[...(t.stopps||[])].filter(s=>s&&s.name).sort((a,b)=>(Number(a.position)||0)-(Number(b.position)||0));
          return sorted[0]?.name||'';
        })(),
        tag_links:[],
        tag_typ:t.tag_typ||'normaltag',
        namen_pflicht:t.stopps.map(s=>s.name).filter(Boolean).join(', '),
        tag_start:t.tag_start||'',
        tag_story:t.tag_story||'',
        hotel_ref:t.hotel_ref||'A',
        zimmer_tipp:t.zimmer_tipp||'',
        // v0.14.3: position-Feld wird mitgespeichert, damit der gemischte Tagesablauf beim Reload
        // korrekt wiederhergestellt werden kann (Stopp ↔ Food ↔ Aktivität gemischt nach position).
        // Backend-Schema bleibt unverändert — position ist additiv und wird vom WF1-Resource-Mapper transparent durchgereicht.
        stopps:t.stopps.filter(s=>s.name).map(s=>({position:Number(s.position)||0,name:s.name,adresse:s.adresse,uhrzeit:s.uhrzeit,dauer:s.dauer,besonderheit:s.besonderheit,insider_tipps:s.insider_tipps})),
        restaurants:t.restaurants.filter(r=>r.name).map(r=>({position:Number(r.position)||0,name:r.name,mahlzeit:r.mahlzeit,charakter:r.charakter,preis:r.preis,adresse:r.adresse,telefon:r.telefon,warum:r.warum})),
        aktivitaeten:t.aktivitaeten.filter(a=>a.name).map(a=>({position:Number(a.position)||0,name:a.name,anbieter:a.anbieter,adresse:a.adresse,telefon:a.telefon,insider_tipps:a.insider_tipps}))
      }))
    };
    const quelltext=`ReiseOrt: ${trip.reise_ort}\nReiseTage: ${trip.anzahl_tage}\nFormat: ${trip.reise_format}\nCharakter: ${trip.reise_charakter}`;
    const taxonomienOut={
      region_subregion:trip.region_sub,
      region_land:trip.region_land,
      reise_art:trip.reise_format,
      erlebnistyp:trip.reise_thema,
      zielgruppe:trip.zielgruppe
    };
    // Bug-3-Disambiguation: Unangetasteter Default-Stub (1 leerer Eintrag, keine Felder befüllt)
    // wird NICHT als hotels_pool_json gesendet → Sheet bleibt leer ('') → Reload zeigt Default-Stub.
    // Aktiv geleerte Liste (User hat alle Hotels gelöscht) wird als '[]' gesendet → Reload zeigt leer.
    const isUnchangedHotelStub=trip.hotels.length===1
      && !trip.hotels[0].name && !trip.hotels[0].hotel_id
      && !trip.hotels[0].adresse && !trip.hotels[0].telefon
      && !trip.hotels[0].tipps && !trip.hotels[0].naechte;
    const hotelsToSave=trip.hotels.filter(h=>h.name||h.hotel_id);
    return {
      entwurf_id:entwurfId,
      created_at:new Date().toISOString(),
      // v0.12: Status bei jedem Save mitsenden — sonst lässt Backend die Spalte leer (Backend-Code:
      // `if (data.status !== undefined) out.status = data.status`). Default beim neuen Entwurf ist 'entwurf'.
      status:tripStatus||'entwurf',
      anzahl_tage:parseInt(trip.anzahl_tage)||0,
      quelltext,
      params,
      taxonomien:taxonomienOut,
      mit_kindern:false,
      hotel_ids:JSON.stringify(trip.hotels.filter(h=>h.hotel_id).map(h=>h.hotel_id)),
      image_source_priority:'unsplash',
      user_id:currentUserId,
      user_name:currentUserName,
      whisperer_id:currentUserId,
      reise_format:trip.reise_format,
      reise_thema:trip.reise_thema,
      reise_charakter:trip.reise_charakter,
      tier:trip.tier,
      match_dimensions_json:trip.match,
      empfohlene_monate_json:trip.empfohlene_monate,
      mietwagen:trip.mietwagen,
      mietwagen_details:trip.mietwagen_details,
      flughafen_empfehlung:trip.flughafen_empfehlung,
      hotels_pool_json:isUnchangedHotelStub?undefined:hotelsToSave,
      freitext_gesamtreise:trip.freitext_gesamtreise,
      persoenliche_erfahrung:trip.persoenliche_erfahrung,
      magic_moment:trip.magic_moment,
      sicherheitshinweise:trip.sicherheitshinweise,
      aktivitaets_level:trip.aktivitaets_level,
      zielgruppe:trip.zielgruppe,
      trust_signale:trip.trust_signale,
      anreise:trip.anreise,
      // v0.15: Emotionale Taxonomie ans Backend mitsenden (Variante B3)
      // Klasse A — Einzelspalten (Whisperer-Input):
      emo_tonalitaet:Number(trip.emo_tonalitaet)||3,
      emo_international:!!trip.emo_international,
      emo_persoenlichkeitsfit:Array.isArray(trip.emo_persoenlichkeitsfit)?trip.emo_persoenlichkeitsfit:[],
      // Klasse B + C — gemeinsames JSON-Feld:
      emotional_tags_json:trip.emotional_tags_json||'',
      analyse_emotional_at:trip.analyse_emotional_at||''
    };
  };

  // ============== SAVE ==============
  const handleSave=async()=>{
    const payload=buildPayload();
    // v0.14.3: Preview-Pfad nur für Admin (Mode-Select sitzt im Admin-Panel, das Curator/Master nicht sehen).
    // So wird ein versehentlich auf 'preview' stehender LocalStorage-Wert für Nicht-Admins ignoriert.
    if(mode==='preview'&&role==='admin'){setShowJson(true);return;}
    setSaveStatus('saving');setSaveMsg('Sende an API...');
    try{
      const data=await apiCall('POST','/save-draft',payload);
      if(data.error){setSaveStatus('error');setSaveMsg('Fehler: '+data.error);}
      else{
        setSaveStatus('success');
        setSaveMsg('Gespeichert! Entwurf-ID: '+entwurfId);
        // URL aktualisieren für Refresh-Sicherheit
        const newUrl=window.location.pathname+'?entwurf_id='+encodeURIComponent(entwurfId);
        window.history.replaceState(null,'',newUrl);
      }
    }catch(err){setSaveStatus('error');setSaveMsg('Fehler: '+err.message);}
    setTimeout(()=>setSaveStatus(null),6000);
  };

  // EXPORT JSON
  const exportJson=()=>{
    const payload=buildPayload();
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=entwurfId+'.json';a.click();URL.revokeObjectURL(url);
  };

  // ============== v0.12: PFLICHTFELD-VALIDIERUNG VOR ÜBERGABE ==============
  // Pflichtfelder beim Status-Wechsel entwurf → übergeben:
  //   Trip: reise_ort, anzahl_tage, region_land, reise_format
  //   Whisperer: vorname, nachname, email
  // Andere Felder bleiben optional. Tagesplanung/Hotel-Pool ebenfalls optional.
  const validateForTransfer=()=>{
    const missing=[];
    if(!trip.reise_ort||!trip.reise_ort.trim()) missing.push('Titel/Destination (Trip-Tab)');
    if(!trip.anzahl_tage||!String(trip.anzahl_tage).trim()) missing.push('Anzahl Reisetage (Trip-Tab)');
    if(!trip.region_land||!trip.region_land.trim()) missing.push('Land (Trip-Tab)');
    if(!trip.reise_format||!trip.reise_format.trim()) missing.push('Reise-Format (Trip-Tab)');
    // v0.13: Bug-Fix — Whisperer-Profil muss tatsächlich in der DB existieren, nicht nur im UI-State.
    // whisperer_id wird nur gesetzt, wenn /whisperer-load oder /whisperer-save erfolgreich war.
    // Ohne diesen Check würde Übergabe mit getippten, aber nicht persistierten Stammdaten gelingen.
    if(!whisperer.whisperer_id||!whisperer.whisperer_id.trim()) missing.push('Whisperer-Profil noch nicht gespeichert — bitte im Whisperer-Tab auf „💾 Profil speichern" klicken');
    if(!whisperer.vorname||!whisperer.vorname.trim()) missing.push('Vorname (Whisperer-Tab)');
    if(!whisperer.nachname||!whisperer.nachname.trim()) missing.push('Nachname (Whisperer-Tab)');
    if(!whisperer.email||!whisperer.email.trim()) missing.push('E-Mail (Whisperer-Tab)');
    return missing;
  };

  // ============== v0.12: ÜBERGABE-WORKFLOW (entwurf → übergeben) ==============
  // 1:1 adamare-Pattern: erst Save (damit Übergabe immer den aktuellen Stand spiegelt),
  // dann /update-status. Bei Fehler im Save brechen wir vor dem Statuswechsel ab.
  const handleTransfer=async()=>{
    if(!entwurfId){alert('Kein Entwurf vorhanden — bitte zuerst speichern.');return;}
    if(!isEditableStatus(tripStatus)){alert('Dieser Entwurf wurde bereits übergeben und kann nicht erneut übergeben werden.');return;}
    const missing=validateForTransfer();
    if(missing.length>0){
      alert('Vor der Übergabe bitte ergänzen:\n\n• '+missing.join('\n• '));
      return;
    }
    // v0.15: Wenn noch keine emotionale Analyse gelaufen ist → Confirm-Dialog zeigen.
    // Whisperer entscheidet: jetzt analysieren oder ohne emotionale Tags übergeben.
    if(!isAnalysed){
      setShowAnalyseConfirm(true);
      return;
    }
    return doTransfer();
  };

  // v0.15: Eigentliche Transfer-Logik in separate Funktion ausgelagert, damit sie auch
  // nach Confirm-Dialog aufgerufen werden kann.
  const doTransfer=async()=>{
    if(!confirm('Reise jetzt zur Master-Freigabe übergeben?\n\nNach Übergabe ist die Reise nicht mehr editierbar, bis sie vom Master/Admin freigegeben oder zurückgewiesen wurde.')) return;

    setTransferStatus('saving');setTransferMsg('Speichere…');
    try{
      // 1) Save mit aktuellem Status 'entwurf'
      const savePayload=buildPayload();
      const saveRes=await apiCall('POST','/save-draft',savePayload);
      if(saveRes.error){
        setTransferStatus('error');setTransferMsg('Save fehlgeschlagen: '+saveRes.error);
        setTimeout(()=>setTransferStatus(null),8000);
        return;
      }
      // 2) Status-Wechsel
      setTransferMsg('Übergebe an Master/Admin…');
      const statusRes=await apiCall('POST','/update-status',{
        draft_id:entwurfId,
        new_status:'übergeben',
        user_id:currentUserId,
        role:role
      });
      if(statusRes.success===false){
        setTransferStatus('error');setTransferMsg('Übergabe fehlgeschlagen: '+(statusRes.error||'unbekannt'));
        setTimeout(()=>setTransferStatus(null),8000);
        return;
      }
      // 3) Lokalen State aktualisieren
      setTripStatus('übergeben');
      setRejectComment('');
      setTransferStatus('success');setTransferMsg('Übergeben — wartet auf Master-Freigabe.');
      // URL aktualisieren
      const newUrl=window.location.pathname+'?entwurf_id='+encodeURIComponent(entwurfId);
      window.history.replaceState(null,'',newUrl);
    }catch(err){
      setTransferStatus('error');setTransferMsg('Fehler: '+err.message);
    }
    setTimeout(()=>setTransferStatus(null),8000);
  };

  // ============== v0.12: LADE-MODAL (Liste eigener / aller Reisen) ==============
  const openLoadModal=async()=>{
    setShowLoadModal(true);
    setLoadList([]);setLoadListError('');setLoadListLoading(true);
    try{
      const data=await apiCall('GET',`/load-draft?user_id=${encodeURIComponent(currentUserId)}&role=${encodeURIComponent(role)}`);
      if(data.success&&data.mode==='list'&&Array.isArray(data.drafts)){
        // Sortierung: zuletzt aktualisiert zuerst
        const sorted=[...data.drafts].sort((a,b)=>{
          const ta=Date.parse(a.updated_at||a.created_at||'')||0;
          const tb=Date.parse(b.updated_at||b.created_at||'')||0;
          return tb-ta;
        });
        setLoadList(sorted);
      }else{
        setLoadListError(data.error||'Liste konnte nicht geladen werden.');
      }
    }catch(err){setLoadListError(err.message);}
    setLoadListLoading(false);
  };
  const closeLoadModal=()=>{setShowLoadModal(false);setLoadList([]);setLoadListError('');};
  const pickDraftFromList=(id)=>{
    if(!id) return;
    window.location.href=window.location.pathname+'?entwurf_id='+encodeURIComponent(id);
  };

  // ============== v0.13: REJECT-WORKFLOW (Master/Admin → Curator zurück) ==============
  const openRejectModal=()=>{
    if(!canManage){alert('Zurückweisen ist Admin/Master vorbehalten.');return;}
    if(tripStatus!=='übergeben'){alert('Nur übergebene Reisen können zurückgewiesen werden.');return;}
    setRejectInput('');setRejectStatus(null);setRejectMsg('');setShowRejectModal(true);
  };
  const closeRejectModal=()=>{
    if(rejectStatus==='saving') return; // während des Calls Modal nicht zumachen
    setShowRejectModal(false);setRejectInput('');setRejectStatus(null);setRejectMsg('');
  };
  const submitReject=async()=>{
    const cmt=(rejectInput||'').trim();
    if(!cmt){alert('Bitte eine Begründung eingeben — der Curator soll wissen, was zu ändern ist.');return;}
    if(!entwurfId){return;}
    setRejectStatus('saving');setRejectMsg('Sende Zurückweisung…');
    try{
      const res=await apiCall('POST','/update-status',{
        draft_id:entwurfId,
        new_status:'entwurf',
        user_id:currentUserId,
        role:role,
        reject_comment:cmt
      });
      if(res.success===false){
        setRejectStatus('error');setRejectMsg('Fehler: '+(res.error||'unbekannt'));
        return;
      }
      // Lokalen State anpassen — Read-only löst sich auf, Reject-Banner erscheint im Trip-Tab.
      setTripStatus('entwurf');
      setRejectComment(cmt);
      setRejectStatus('success');setRejectMsg('Zurückgewiesen. Curator kann jetzt überarbeiten.');
      setTimeout(()=>{setShowRejectModal(false);setRejectStatus(null);setRejectMsg('');},1800);
    }catch(err){
      setRejectStatus('error');setRejectMsg('Fehler: '+err.message);
    }
  };

  // ============== v0.13: DELETE-WORKFLOW (canManage) ==============
  const handleDeleteDraft=async(draft_id)=>{
    if(!canManage){alert('Löschen ist Admin/Master vorbehalten.');return;}
    if(!draft_id) return;
    if(!confirm('Diesen Entwurf wirklich löschen?\n\nDer Eintrag wird im Sheet als „DELETED" markiert (Soft-Delete) und verschwindet aus der Liste.')) return;
    setDeletingId(draft_id);
    try{
      const res=await apiCall('POST','/delete-draft',{
        draft_id:draft_id,
        user_id:currentUserId,
        role:role
      });
      if(res.success===false){
        alert('Löschen fehlgeschlagen: '+(res.error||'unbekannt'));
      }else{
        // Aus Liste entfernen
        setLoadList(prev=>prev.filter(d=>d.entwurf_id!==draft_id));
      }
    }catch(err){
      alert('Fehler: '+err.message);
    }
    setDeletingId('');
  };

  // ============== v0.13: GENERATE-STUB (UI-only, Backend-Call deaktiviert) ==============
  // Der echte /generate-Endpoint ist Backend-seitig live (status='in_generierung' + Reisen_Roh-Append + WF3-Trigger),
  // wird aber bewusst noch nicht ausgelöst, bis WF3 produktionsbereit ist und freigegeben wird.
  // Bis dahin ist der Generieren-Button visuell sichtbar (Position/Platz) aber disabled mit Tooltip.
  // TODO Stufe 3: Modal + handleGenerate-Funktion mit echtem apiCall('POST','/generate',{draft_id,user_id,role}).

  // ============== WHISPERER PAYLOAD/SAVE/LOAD ==============
  const buildWhispererPayload=()=>({
    whisperer_id:whisperer.whisperer_id||'',
    status:whisperer.status||'entwurf',
    user_id:currentUserId,
    vorname:whisperer.vorname,
    nachname:whisperer.nachname,
    email:whisperer.email,
    geburtsdatum:whisperer.geburtsdatum,
    nationalitaet:whisperer.nationalitaet,
    wohnsitz:whisperer.wohnsitz,
    profilfoto_urls_json:JSON.stringify(whisperer.profilfoto_urls||[]),
    kurz_bio:whisperer.kurz_bio,
    beruf:whisperer.beruf,
    familienstand:whisperer.familienstand,
    sprachen_json:JSON.stringify(whisperer.sprachen||[]),
    social_media:whisperer.social_media,
    regionen_json:JSON.stringify(whisperer.regionen||[]),
    insider_tiefe_json:JSON.stringify(whisperer.insider_tiefe||{}),
    pre_curation:whisperer.pre_curation,
    programm_dichte:whisperer.programm_dichte,
    komfort_bandbreite_json:JSON.stringify(whisperer.komfort_bandbreite||[]),
    begleitung_aktiv:whisperer.begleitung_aktiv?'true':'false',
    begl_verfuegbarkeit_json:JSON.stringify(whisperer.begl_verfuegbarkeit||{}),
    begl_energie_stil:whisperer.begl_energie_stil,
    begl_vermittlungsstil:whisperer.begl_vermittlungsstil,
    begl_ton:whisperer.begl_ton,
    begl_geschlecht:whisperer.begl_geschlecht,
    begl_vorab_gespraech:whisperer.begl_vorab_gespraech?'true':'false'
  });

  const handleWhispererSave=async()=>{
    setWhispererStatus('saving');setWhispererMsg('Sende an API...');
    try{
      const data=await apiCall('POST','/whisperer-save',buildWhispererPayload());
      if(data.error){setWhispererStatus('error');setWhispererMsg('Fehler: '+data.error);}
      else{
        setWhispererStatus('success');
        setWhispererMsg('Gespeichert! Whisperer-ID: '+(data.whisperer_id||whisperer.whisperer_id||'(neu)'));
        if(data.whisperer_id&&!whisperer.whisperer_id){setW('whisperer_id',data.whisperer_id);}
      }
    }catch(err){setWhispererStatus('error');setWhispererMsg('Fehler: '+err.message);}
    setTimeout(()=>setWhispererStatus(null),6000);
  };

  // v0.14.3: Hydrate-Logik aus handleWhispererLoad extrahiert, damit Auto-Load (beim Login)
  // und manueller Load denselben Code nutzen.
  const hydrateWhisperer=useCallback((data)=>{
    setWhisperer(p=>({
      ...p,
      whisperer_id:data.whisperer_id||p.whisperer_id,
      status:data.status||p.status,
      vorname:data.vorname||p.vorname,
      nachname:data.nachname||p.nachname,
      email:data.email||p.email,
      geburtsdatum:data.geburtsdatum||p.geburtsdatum,
      nationalitaet:data.nationalitaet||p.nationalitaet,
      wohnsitz:data.wohnsitz||p.wohnsitz,
      profilfoto_urls:safeJson(data.profilfoto_urls_json,p.profilfoto_urls),
      kurz_bio:data.kurz_bio||p.kurz_bio,
      beruf:data.beruf||p.beruf,
      familienstand:data.familienstand||p.familienstand,
      sprachen:safeJson(data.sprachen_json,p.sprachen),
      social_media:data.social_media||p.social_media,
      regionen:safeJson(data.regionen_json,p.regionen),
      insider_tiefe:safeJson(data.insider_tiefe_json,p.insider_tiefe),
      pre_curation:parseInt(data.pre_curation)||p.pre_curation,
      programm_dichte:parseInt(data.programm_dichte)||p.programm_dichte,
      komfort_bandbreite:safeJson(data.komfort_bandbreite_json,p.komfort_bandbreite),
      begleitung_aktiv:(data.begleitung_aktiv||'').toString().toLowerCase()==='true',
      begl_verfuegbarkeit:safeJson(data.begl_verfuegbarkeit_json,p.begl_verfuegbarkeit),
      begl_energie_stil:parseInt(data.begl_energie_stil)||p.begl_energie_stil,
      begl_vermittlungsstil:parseInt(data.begl_vermittlungsstil)||p.begl_vermittlungsstil,
      begl_ton:parseInt(data.begl_ton)||p.begl_ton,
      begl_geschlecht:data.begl_geschlecht||p.begl_geschlecht,
      begl_vorab_gespraech:(data.begl_vorab_gespraech||'').toString().toLowerCase()==='true'
    }));
  },[]);

  const handleWhispererLoad=async()=>{
    // Admin/Master: optional fremde user_id via adminLoadUserId-Textfeld;
    // leeres Feld oder Curator-Rolle → eigenes Profil.
    const targetUserId=(canManage&&adminLoadUserId.trim())?adminLoadUserId.trim():currentUserId;
    if(!targetUserId){setWhispererStatus('error');setWhispererMsg('Kein User-ID — bitte einloggen');return;}
    setWhispererStatus('saving');setWhispererMsg(targetUserId===currentUserId?'Lade Profil...':'Lade Profil von '+targetUserId+'...');
    try{
      const data=await apiCall('GET','/whisperer-load?user_id='+encodeURIComponent(targetUserId));
      if(data.success===false){
        const isOwnProfile=targetUserId===currentUserId;
        const msg=(/Kein Whisperer-Profil/i.test(data.error||''))
          ?(isOwnProfile?'Noch kein Profil vorhanden — bitte zuerst über „Profil speichern" anlegen.':'Kein Profil für user_id „'+targetUserId+'" vorhanden.')
          :(data.error||'Kein Profil gefunden.');
        setWhispererStatus('error');setWhispererMsg(msg);return;
      }
      hydrateWhisperer(data);
      setWhispererStatus('success');setWhispererMsg('Profil geladen.');
    }catch(err){setWhispererStatus('error');setWhispererMsg('Fehler: '+err.message);}
    setTimeout(()=>setWhispererStatus(null),6000);
  };

  // v0.14: JSON-Vorschau-Tab entfernt (Aufräumen). Der showJson-State bleibt im Code,
  // weil das Admin-Config-Panel einen "Modus: JSON-Vorschau"-Schalter hat, der den
  // Save-Handler in den JSON-Vorschau-Modus zwingt. Dieser Pfad ist Admin-only und
  // verlässt die Vorschau über den "← Zurück zum Formular"-Button im JSON-View.
  const tabs=[{id:'whisperer',label:'Whisperer-Profil',icon:'👤'},{id:'trip',label:'Reise-Eingabe',icon:'✈️'},{id:'tage',label:'Tagesplanung',icon:'📅'}];

  // Render-Gate: ohne eingeloggten User wird der Login-Screen gezeigt, App-UI bleibt verborgen.
  if(!currentUser){
    return <LoginScreen apiBase={apiBase} authHeaderName={authHeaderName} authHeaderValue={authHeaderValue} onAuthHeaderValueChange={setAuthHeaderValue} onLogin={handleLogin}/>;
  }

  return <div style={{minHeight:'100vh'}}>
    {/* Header */}
    <div style={{background:'var(--white)',borderBottom:'3px solid var(--sage)',padding:'16px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
      <div>
        <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:22,color:'var(--sage)',fontWeight:700}}>WHISPERED WAYS</div>
        <div style={{fontSize:12,color:'#999',marginTop:2}}>Whisperer Onboarding — v0.15.1 (Emotional Taxonomy)</div>
      </div>
      <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{fontSize:11,color:'#999'}}>ID: {entwurfId||'—'}</div>
        {/* v0.14.4: Hilfe-Button — öffnet die Curator-Anleitung in neuem Tab. */}
        <a href="https://docs.google.com/document/d/1JyREmrhfr3ZrRr3h9Re0vP48OzOIIxlSnyzP2DafIng/edit?tab=t.0" target="_blank" rel="noopener noreferrer" title="Anleitung öffnen" style={{display:'flex',alignItems:'center',gap:4,padding:'6px 10px',background:'var(--beige-light)',border:'1px solid #E0E0E0',borderRadius:6,fontSize:12,fontWeight:600,color:'var(--sage-dark)',textDecoration:'none',fontFamily:'inherit'}}>❓ Hilfe</a>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'4px 10px',background:'var(--beige-light)',border:'1px solid #E0E0E0',borderRadius:6}}>
          <span style={{fontSize:13,fontWeight:600,color:'var(--anthrazit)'}}>{currentUser.display_name||currentUser.name||currentUser.email}</span>
          <span style={{fontSize:10,fontWeight:700,color:'var(--white)',background:ROLE_COLORS[role]||'#888',padding:'2px 8px',borderRadius:4,textTransform:'uppercase',letterSpacing:0.5}}>{ROLE_LABELS[role]||role}</span>
          <button onClick={handleLogout} title="Abmelden" style={{background:'transparent',border:'1px solid #D0D0D0',borderRadius:4,padding:'2px 8px',fontSize:11,cursor:'pointer',color:'#666',fontFamily:'inherit'}}>↪ Abmelden</button>
        </div>
        <div style={{background:'var(--sage)',color:'var(--white)',padding:'6px 14px',borderRadius:6,fontSize:12,fontWeight:700}}>v0.15.1</div>
      </div>
    </div>

    {/* v0.13: Deep-Link-Banner — wird gezeigt, wenn ein ?entwurf_id=…-Link nicht geladen werden konnte
        (Backend hat 'Kein Zugriff' oder 'Entwurf nicht gefunden' geantwortet). entwurfId bleibt leer,
        Save/Übergeben sind blockiert. User kann entweder eine neue Reise anlegen (Page-Reload zur sauberen URL)
        oder über das Lade-Modal eine zugreifbare Reise wählen. */}
    {loadAccessError&&<div style={{background:'#FDECEA',borderBottom:'2px solid var(--red)',color:'var(--anthrazit)',padding:'12px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        <span style={{fontSize:18}}>⚠</span>
        <div>
          <div style={{fontWeight:700,fontSize:13,color:'var(--red)'}}>Reise konnte nicht geladen werden</div>
          <div style={{fontSize:12,color:'#666',marginTop:2}}>{loadAccessError}</div>
        </div>
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <button onClick={()=>{window.location.href=window.location.pathname;}} style={{background:'var(--white)',color:'var(--sage)',border:'2px solid var(--sage)',padding:'8px 14px',borderRadius:6,fontSize:13,cursor:'pointer',fontWeight:600}}>+ Neue Reise</button>
        <button onClick={openLoadModal} style={{background:'var(--coral)',color:'var(--white)',border:'none',padding:'8px 14px',borderRadius:6,fontSize:13,cursor:'pointer',fontWeight:600}}>📂 Andere Reise wählen</button>
      </div>
    </div>}

    {/* Config Panel — nur für Admin sichtbar (Backend-/Test-Zugriff). Master und Curator
        sehen ein aufgeräumtes UI ohne API-Base/Header/Modus-Inputs. */}
    {role==='admin'&&<div className="config-panel">
      <div className="cfg-grid" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,alignItems:'center'}}>
        <label style={{display:'flex',gap:6,alignItems:'center'}}>API: <input value={apiBase} onChange={e=>setApiBase(e.target.value)} style={{flex:1,minWidth:0}}/></label>
        <label style={{display:'flex',gap:6,alignItems:'center'}}>Header: <input value={authHeaderName} onChange={e=>setAuthHeaderName(e.target.value)} style={{width:130}} placeholder="Authorization"/> <input type="password" value={authHeaderValue} onChange={e=>setAuthHeaderValue(e.target.value)} style={{flex:1,minWidth:0}} placeholder="Bearer …"/></label>
        <label style={{display:'flex',gap:6,alignItems:'center'}}>Modus: <select value={mode} onChange={e=>setMode(e.target.value)}><option value="preview">JSON-Vorschau</option><option value="live">Live API</option></select> <span style={{fontSize:10,color:mode==='live'?'#4CAF50':'#FFC107'}}><span className="status-dot" style={{background:mode==='live'?'#4CAF50':'#FFC107'}}></span>{mode==='live'?'LIVE':'VORSCHAU'}</span></label>
      </div>
      <div className="cfg-grid" style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:12,alignItems:'center',marginTop:8}}>
        <div style={{fontSize:11,color:'#aaa'}}>Eingeloggt als <code style={{color:'#ddd'}}>{currentUserId||'—'}</code> ({currentUserName||'—'})</div>
        <div style={{fontSize:10,color:bootstrap.status==='ok'?'#4CAF50':bootstrap.status==='error'?'#FF5252':'#FFC107'}}>
          <span className="status-dot" style={{background:bootstrap.status==='ok'?'#4CAF50':bootstrap.status==='error'?'#FF5252':'#FFC107'}}></span>
          {bootstrap.status==='pending'&&'Lade Taxonomien & Tagesarten…'}
          {bootstrap.status==='ok'&&`Bootstrap OK · ${(taxonomien.region_land||[]).length} Länder · ${tagesartenList.length} Tagesarten`}
          {bootstrap.status==='partial'&&`Teilweise: ${bootstrap.error}`}
          {bootstrap.status==='error'&&`Fehler: ${bootstrap.error}`}
        </div>
      </div>
    </div>}

    {/* Tabs — v0.14: JSON-Spezialbehandlung entfernt, weil der json-Tab nicht mehr in tabs[] steht. */}
    <div style={{display:'flex',gap:0,background:'var(--white)',borderBottom:'1px solid #E0E0E0',padding:'0 24px',overflowX:'auto'}}>
      {tabs.map(t=><button key={t.id} className="tab-btn" onClick={()=>{setShowJson(false);setTab(t.id);}} style={{padding:'12px 20px',border:'none',cursor:'pointer',background:(tab===t.id&&!showJson)?'var(--beige)':'transparent',borderBottom:(tab===t.id&&!showJson)?'3px solid var(--sage)':'3px solid transparent',fontFamily:"'Playfair Display',Georgia,serif",fontSize:14,color:(tab===t.id&&!showJson)?'var(--sage)':'#999',fontWeight:700,whiteSpace:'nowrap'}}>{t.icon} {t.label}</button>)}
    </div>

    <div style={{maxWidth:720,margin:'0 auto',padding:'20px 24px 60px'}}>

      {/* JSON PREVIEW */}
      {showJson&&<div>
        <Section title="JSON-Payload (save-draft)" icon="{ }" open={openSections.json} onToggle={()=>toggleSection('json')}>
          <div style={{marginBottom:12,fontSize:12,color:'var(--anthrazit)'}}>
            Dies ist das JSON, das an <code>{apiBase}/save-draft</code> gesendet wird.
          </div>
          <JsonView data={buildPayload()}/>
        </Section>
        <div style={{display:'flex',gap:12,marginTop:16,flexWrap:'wrap'}}>
          <button onClick={exportJson} style={{background:'var(--sage)',color:'var(--white)',border:'none',padding:'10px 20px',borderRadius:8,fontSize:14,cursor:'pointer',fontWeight:600}}>📥 JSON herunterladen</button>
          <button onClick={()=>{navigator.clipboard.writeText(JSON.stringify(buildPayload(),null,2));alert('JSON kopiert!');}} style={{background:'var(--white)',color:'var(--sage)',border:'2px solid var(--sage)',padding:'10px 20px',borderRadius:8,fontSize:14,cursor:'pointer',fontWeight:600}}>📋 In Zwischenablage</button>
          <button onClick={()=>setShowJson(false)} style={{background:'var(--white)',color:'#999',border:'1px solid #D0D0D0',padding:'10px 20px',borderRadius:8,fontSize:14,cursor:'pointer'}}>← Zurück zum Formular</button>
        </div>
      </div>}

      {/* WHISPERER TAB */}
      {!showJson&&tab==='whisperer'&&(()=>{
        const NIVEAUS=['Muttersprache','Fließend','Gut','Grundkenntnisse'];
        const SPRACHEN=['Deutsch','Englisch','Französisch','Spanisch','Italienisch','Portugiesisch','Niederländisch','Russisch','Polnisch','Türkisch','Arabisch','Chinesisch','Japanisch','Andere'];
        const FAMILIENSTAND=['Keine Angabe','Single','In Partnerschaft','Verheiratet','Familie mit Kindern'];
        const NATIONALITAETEN=['Deutsch','Österreichisch','Schweizerisch','Italienisch','Spanisch','Französisch','Niederländisch','Andere'];
        const setSprache=(idx,key,val)=>{const s=[...whisperer.sprachen];s[idx]={...s[idx],[key]:val};setW('sprachen',s);};
        const addSprache=()=>setW('sprachen',[...whisperer.sprachen,{sprache:'',niveau:'Grundkenntnisse'}]);
        const removeSprache=(idx)=>setW('sprachen',whisperer.sprachen.filter((_,i)=>i!==idx));
        const setRegion=(regs)=>{
          // Beim Entfernen: insider_tiefe-Eintrag mit aufräumen
          const newTiefe={...whisperer.insider_tiefe};
          Object.keys(newTiefe).forEach(k=>{if(!regs.includes(k))delete newTiefe[k];});
          setW('regionen',regs);setW('insider_tiefe',newTiefe);
        };
        const setTiefe=(region,val)=>setW('insider_tiefe',{...whisperer.insider_tiefe,[region]:val});
        const regionenOpts=(taxRegionLand&&taxRegionLand.length)?taxRegionLand:[];
        const labelForRegion=(code)=>{const found=regionenOpts.find(r=>(r.value||r)===code);return found?(found.label||found):code;};
        return <>
          {/* v0.14: Action-Bar mit Profil-Buttons wurde in den tab-abhängigen Footer verschoben.
              Hier oben steht stattdessen ein Hinweis-Banner, der klar macht:
              - dass dieser Tab das Whisperer-Profil bearbeitet (separat von Reisen)
              - wie der Motivations-Anreiz aussieht (Vollständigkeit zahlt sich aus)
              - bei canManage zusätzlich der Hinweis auf das user_id-Feld unten im Footer */}
          <div style={{background:'var(--beige-light)',border:'1px solid var(--sage-light)',padding:'12px 16px',borderRadius:8,marginBottom:16,fontSize:13,color:'var(--anthrazit)'}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:10,flexWrap:'wrap'}}>
              <span style={{fontSize:18,lineHeight:1.2}}>👤</span>
              <div style={{flex:1,minWidth:240}}>
                <div style={{fontWeight:700,marginBottom:4}}>Du bearbeitest dein Whisperer-Profil.</div>
                <div style={{fontSize:12,color:'#666'}}>Diese Daten werden separat von einzelnen Reisen gespeichert. Vollständige Profile sind besser auffindbar und führen zu mehr Buchungen.{canManage?' Über das Feld unten im Footer kannst du als Admin/Master ein fremdes Profil laden.':''}</div>
              </div>
              {whisperer.whisperer_id&&<span style={{fontSize:11,color:'var(--sage-dark)',background:'var(--sage-light)',padding:'4px 10px',borderRadius:4,fontWeight:600,whiteSpace:'nowrap'}}>{whisperer.whisperer_id}</span>}
            </div>
          </div>

          <Section title="Persönliche Daten" icon="📋" open={openSections.wIdent} onToggle={()=>toggleSection('wIdent')}>
            <div className="field-row" style={{display:'flex',flexWrap:'wrap',gap:16}}>
              <Field label="Vorname" badge="PFLICHT" half><TI placeholder="Max" value={whisperer.vorname} onChange={v=>setW('vorname',v)}/></Field>
              <Field label="Nachname" badge="PFLICHT" half><TI placeholder="Mustermann" value={whisperer.nachname} onChange={v=>setW('nachname',v)}/></Field>
            </div>
            <div className="field-row" style={{display:'flex',flexWrap:'wrap',gap:16}}>
              <Field label="E-Mail" badge="PFLICHT" half><TI placeholder="max@example.com" value={whisperer.email} onChange={v=>setW('email',v)}/></Field>
              <Field label="Geburtsdatum" badge="PFLICHT" half><TI placeholder="TT.MM.JJJJ" value={whisperer.geburtsdatum} onChange={v=>setW('geburtsdatum',v)}/></Field>
            </div>
            <div className="field-row" style={{display:'flex',flexWrap:'wrap',gap:16}}>
              <Field label="Nationalität" badge="PFLICHT" half><Sel options={NATIONALITAETEN.map(n=>({value:n,label:n}))} value={whisperer.nationalitaet} onChange={v=>setW('nationalitaet',v)}/></Field>
              <Field label="Wohnsitz" badge="PFLICHT" half><TI placeholder="z.B. München, Deutschland" value={whisperer.wohnsitz} onChange={v=>setW('wohnsitz',v)}/></Field>
            </div>
          </Section>

          <Section title="Öffentliches Profil (sichtbar für Alle)" icon="🌍" open={openSections.wPublic} onToggle={()=>toggleSection('wPublic')}>
            <Field label="Profilfotos" badge="PFLICHT" hint="1–3 Fotos · erstes Foto = Hauptfoto · max. 1200 px / 500 KB">
              <ProfilfotoUploader
                value={whisperer.profilfoto_urls||[]}
                onChange={v=>setW('profilfoto_urls',v)}
                uploadFn={uploadProfilfoto}
                max={3}
              />
            </Field>
            <Field label="Kurz-Bio" badge="PFLICHT" hint="max. 500 Zeichen"><TA placeholder={"Erzähl den Reisenden, wer du bist. Anregungen:\n• Wer ich bin und wo ich lebe\n• Was mich an meiner Region begeistert\n• Was Reisende bei mir erleben\n• Mein Reise-Stil in einem Satz"} rows={6} value={whisperer.kurz_bio} onChange={v=>setW('kurz_bio',v.slice(0,500))}/></Field>
            <div className="field-row" style={{display:'flex',flexWrap:'wrap',gap:16}}>
              <Field label="Beruf / Hintergrund" badge="EMPFOHLEN" half><TI placeholder="z.B. Architektin, Koch" value={whisperer.beruf} onChange={v=>setW('beruf',v)}/></Field>
              <Field label="Familienstand" badge="OPTIONAL" half><Sel options={FAMILIENSTAND.map(f=>({value:f,label:f}))} value={whisperer.familienstand} onChange={v=>setW('familienstand',v)}/></Field>
            </div>
            <Field label="Sprachen & Niveau" badge="PFLICHT">
              <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                {whisperer.sprachen.map((s,i)=><div key={i} style={{display:'flex',gap:6,alignItems:'center',background:'var(--beige-light)',padding:'4px 6px 4px 10px',borderRadius:6,border:'1px solid #D0D0D0'}}>
                  <select style={{fontSize:13,border:'none',background:'transparent'}} value={s.sprache} onChange={e=>setSprache(i,'sprache',e.target.value)}>
                    <option value="">— wählen —</option>
                    {SPRACHEN.map(sp=><option key={sp} value={sp}>{sp}</option>)}
                  </select>
                  <select style={{fontSize:11,border:'none',background:'transparent',color:'var(--sage)'}} value={s.niveau} onChange={e=>setSprache(i,'niveau',e.target.value)}>
                    {NIVEAUS.map(n=><option key={n} value={n}>{n}</option>)}
                  </select>
                  <span onClick={()=>removeSprache(i)} style={{cursor:'pointer',color:'#999',fontSize:14,padding:'0 4px'}}>×</span>
                </div>)}
                <button onClick={addSprache} style={{background:'none',border:'1px dashed var(--sage)',borderRadius:6,padding:'4px 12px',color:'var(--sage)',cursor:'pointer',fontSize:12}}>+ Weitere Sprache</button>
              </div>
            </Field>
            <Field label="Social Media" badge="OPTIONAL"><TI placeholder="Instagram, LinkedIn, Blog..." value={whisperer.social_media} onChange={v=>setW('social_media',v)}/></Field>
          </Section>

          <Section title="Regionen & Expertise" icon="🗺️" open={openSections.wRegion} onToggle={()=>toggleSection('wRegion')}>
            <Field label="Welche Regionen/Länder kennst du?" badge="EMPFOHLEN" hint="Mehrfachauswahl — vollständige Angaben verbessern die Auffindbarkeit deiner Reisen."><MC options={regionenOpts} value={whisperer.regionen} onChange={setRegion} columns={3}/></Field>
            {whisperer.regionen.length>0&&<Field label="Insider-Tiefe pro Region" badge="EMPFOHLEN">
              <div style={{background:'var(--beige-light)',padding:12,borderRadius:8,border:'1px solid #E0E0E0'}}>
                {whisperer.regionen.map(r=><div key={r} style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
                  <span style={{fontSize:13,fontWeight:600,minWidth:120}}>{labelForRegion(r)}</span>
                  <div style={{flex:1}}><Slider labels={['Tourist','Kenner','Insider','Experte','Heimat']} value={whisperer.insider_tiefe[r]||3} onChange={v=>setTiefe(r,v)} dim={'IT-'+r}/></div>
                </div>)}
              </div>
            </Field>}
          </Section>

          <Section title="Stil & Vorlieben" icon="🎯" open={openSections.wStil} onToggle={()=>toggleSection('wStil')}>
            <div style={{background:'var(--beige-light)',padding:16,borderRadius:8,border:'1px solid var(--sage-light)'}}>
              <div style={{fontSize:12,color:'var(--sage)',marginBottom:12,fontStyle:'italic'}}>Je genauer, desto besser passen Reisende zu dir — und desto mehr Buchungen.</div>
              <Field label="Planungsintensität" badge="EMPFOHLEN"><Slider labels={['Offen','Grobgerüst','Tagesstruktur','Stunden-Plan','Minutiös']} value={whisperer.pre_curation} onChange={v=>setW('pre_curation',v)} dim="W1"/></Field>
              <Field label="Programmdichte" badge="EMPFOHLEN"><Slider labels={['Sehr ruhig','Entspannt','Ausgewogen','Voll','Intensiv']} value={whisperer.programm_dichte} onChange={v=>setW('programm_dichte',v)} dim="W2"/></Field>
              <Field label="Komfort-Bandbreite" badge="EMPFOHLEN" hint="In welchen Niveaus arbeitest du?"><MC options={['Einfach/Authentisch','Solide','Komfortabel','Premium','Luxus']} value={whisperer.komfort_bandbreite} onChange={v=>setW('komfort_bandbreite',v)} columns={3}/></Field>
            </div>
          </Section>

          <Section title="Begleitungs-Rolle" icon="🤝" open={openSections.wBegl} onToggle={()=>toggleSection('wBegl')}>
            <Field label="Möchtest du Reisen auch persönlich begleiten?" badge="PFLICHT">
              <Radio options={[{value:'ja',label:'Ja, ich begleite auch'},{value:'nein',label:'Nein, nur Content'}]} value={whisperer.begleitung_aktiv?'ja':'nein'} onChange={v=>setW('begleitung_aktiv',v==='ja')} name="begl"/>
            </Field>
            {whisperer.begleitung_aktiv&&<div style={{background:'var(--beige-light)',padding:16,borderRadius:8,border:'1px solid var(--coral-light)',marginTop:8}}>
              <div style={{fontSize:12,color:'var(--coral)',marginBottom:12,fontWeight:600}}>Zusatzfelder für begleitende Whisperer</div>
              <Field label="Verfügbarkeit (Monate)" badge="PFLICHT" hint="1. Klick = Grün (Verfügbar), 2. Klick = Gelb (Eingeschränkt), 3. Klick = Rot (Nicht verfügbar)"><MonthSel value={whisperer.begl_verfuegbarkeit} onChange={v=>setW('begl_verfuegbarkeit',v)}/></Field>
              <Field label="Energie-Stil" badge="EMPFOHLEN"><Slider labels={['Sehr ruhig','Ruhig','Ausgewogen','Lebendig','Sehr lebendig']} value={whisperer.begl_energie_stil} onChange={v=>setW('begl_energie_stil',v)} dim="WB1"/></Field>
              <Field label="Vermittlungsstil" badge="EMPFOHLEN"><Slider labels={['Lehrend','','Mix','','Erzählend']} value={whisperer.begl_vermittlungsstil} onChange={v=>setW('begl_vermittlungsstil',v)} dim="WB2"/></Field>
              <Field label="Ton" badge="EMPFOHLEN"><Slider labels={['Formell','','Ausgewogen','','Locker']} value={whisperer.begl_ton} onChange={v=>setW('begl_ton',v)} dim="WB3"/></Field>
              <div className="field-row" style={{display:'flex',flexWrap:'wrap',gap:16}}>
                <Field label="Geschlecht" badge="OPTIONAL" half><Sel options={['Keine Angabe','Weiblich','Männlich','Divers'].map(g=>({value:g,label:g}))} value={whisperer.begl_geschlecht} onChange={v=>setW('begl_geschlecht',v)}/></Field>
                <Field label="Vorab-Gespräch möglich?" badge="EMPFOHLEN" half><Radio options={[{value:'ja',label:'Ja'},{value:'nein',label:'Nein'}]} value={whisperer.begl_vorab_gespraech?'ja':'nein'} onChange={v=>setW('begl_vorab_gespraech',v==='ja')} name="vorgespr"/></Field>
              </div>
            </div>}
          </Section>
        </>;
      })()}

      {/* TRIP TAB */}
      {!showJson&&tab==='trip'&&<>
        {/* v0.12: Status-Hinweisbanner. Erscheint, sobald der Status nicht mehr 'entwurf' ist. */}
        {!isEditableStatus(tripStatus)&&<div style={{background:'#FFF4E5',border:'1px solid var(--coral)',color:'var(--anthrazit)',padding:'12px 16px',borderRadius:8,marginBottom:16,fontSize:13,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <span style={{fontSize:18}}>🔒</span>
          <span><strong>Status: {STATUS_LABELS[tripStatus]||tripStatus}</strong> — diese Reise ist nicht mehr editierbar.</span>
        </div>}
        {/* v0.13: Reject-Banner — sichtbar wenn die Reise nach Zurückweisung wieder im Entwurfsstatus ist
            UND ein reject_comment vorliegt. Verschwindet nach erneuter Übergabe automatisch
            (handleTransfer setzt rejectComment auf ''). */}
        {isEditableStatus(tripStatus)&&rejectComment&&<div style={{background:'#FDECEA',border:'1px solid var(--red)',color:'var(--anthrazit)',padding:'12px 16px',borderRadius:8,marginBottom:16,fontSize:13}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6,fontWeight:700,color:'var(--red)'}}>
            <span style={{fontSize:18}}>↩</span>
            <span>Diese Reise wurde zurückgewiesen — bitte überarbeiten und erneut übergeben.</span>
          </div>
          <div style={{whiteSpace:'pre-wrap',background:'var(--white)',border:'1px solid #E0E0E0',borderRadius:6,padding:'8px 12px',marginTop:6,color:'var(--anthrazit)',fontSize:12}}>
            <strong style={{fontSize:11,color:'#888',display:'block',marginBottom:4}}>Begründung:</strong>
            {rejectComment}
          </div>
        </div>}
        {/* v0.14: Motivations-Hinweis — nur sichtbar wenn die Reise editierbar ist UND
            kein Reject-Comment vorliegt (sonst würden zwei Banner direkt übereinander stehen). */}
        {isEditableStatus(tripStatus)&&!rejectComment&&<div style={{background:'var(--beige-light)',border:'1px solid var(--sage-light)',color:'var(--anthrazit)',padding:'10px 14px',borderRadius:8,marginBottom:16,fontSize:12,display:'flex',alignItems:'flex-start',gap:8}}>
          <span style={{fontSize:16,lineHeight:1.2}}>✈️</span>
          <span>Je vollständiger die Angaben, desto besser passt die Reise zum Reisenden — und desto wahrscheinlicher wird sie gebucht.</span>
        </div>}
        {/* v0.12: Read-only-Wrapper. <fieldset disabled> deaktiviert alle Inputs/Selects/Textareas/Buttons
            innerhalb des Trip-Tabs nativ — keine Touches an den einzelnen Feldern nötig. */}
        <fieldset disabled={!isEditableStatus(tripStatus)} style={{border:'none',padding:0,margin:0,minWidth:0}}>
        <Section title="Basis-Informationen" icon="📌" open={openSections.basis} onToggle={()=>toggleSection('basis')}>
          <Field label="Titel / Destination" badge="PFLICHT"><TI placeholder="z.B. Andalusien, Spanien" value={trip.reise_ort} onChange={v=>setT('reise_ort',v)}/></Field>
          <div className="field-row" style={{display:'flex',flexWrap:'wrap',gap:16}}>
            <Field label="Region" badge="PFLICHT" half><Sel options={taxRegionSub} value={trip.region_sub} onChange={v=>setT('region_sub',v)}/></Field>
            <Field label="Land" badge="PFLICHT" half hint={trip.region_land?`Country-Code: ${getCountryCodeForLand()||'—'}`:''}><Sel options={taxRegionLand} value={trip.region_land} onChange={v=>setT('region_land',v)}/></Field>
          </div>
          <div className="field-row" style={{display:'flex',flexWrap:'wrap',gap:16}}>

          <InsiderField number={1} title="Dein Insider-Wissen zur Gesamtreise" hint="Anreise-Tipps, Straßenempfehlungen, Maut, regionale Besonderheiten (F1). Tagesgenaue Insidertips unter Tagesplanung eintragen." placeholder="AP-7 statt A-7, Siesta beachten, Abendessen nie vor 20h..." value={trip.freitext_gesamtreise} onChange={v=>setT('freitext_gesamtreise',v)}/>

        <Section title="Reiseprofil" icon="🏷️" open={openSections.taxonomie} onToggle={()=>toggleSection('taxonomie')}>

          <Field label="Reise-Art" badge="PFLICHT" hint="WARUM?"><Radio options={taxReiseArt} value={trip.reise_charakter} onChange={v=>setT('reise_charakter',v)} name="charakter"/></Field>
          <div className="field-row" style={{display:'flex',flexWrap:'wrap',gap:16}}>

          <Field label="Aktivitäts-Level" badge="PFLICHT"><Radio options={[{value:'leicht',label:'Leicht'},{value:'moderat',label:'Moderat'},{value:'anspruchsvoll',label:'Anspruchsvoll'}]} value={trip.aktivitaets_level} onChange={v=>setT('aktivitaets_level',v)} name="level"/></Field>
        </Section>

        <Section title="Stil-Faktoren der Reise" icon="🎯" open={openSections.match} onToggle={()=>toggleSection('match')}>
          <div style={{background:'var(--beige-light)',padding:16,borderRadius:8,border:'1px solid var(--sage-light)'}}>
            <div style={{fontSize:12,color:'var(--sage-dark)',marginBottom:12,fontStyle:'italic'}}>Erfolgs-Faktoren für deine Auswahl — je vollständiger, desto besser passt die Reise zum Reisenden.</div>
            {/* v0.14.1: Alle Stil-Faktoren-Slider von PFLICHT auf EMPFOHLEN umgestellt (Plan A3).
                Die Match-Dimensionen waren nie wirklich pflichtige Eingaben — sie haben Default-Wert 3 (Mitte),
                d.h. der Curator konnte sie auch ohne bewusste Eingabe schon "ausfüllen". Das macht die alte
                Pflicht-Markierung formal sinnlos. EMPFOHLEN ist die ehrlichere Markierung. */}
            <Field label="Planungsintensität" badge="EMPFOHLEN"><Slider labels={['Offen','Grobgerüst','Tagesstruktur','Stunden-Plan','Minutiös']} value={trip.match.pre_curation} onChange={v=>setMatch('pre_curation',v)} dim="1"/></Field>
            <Field label="Programmdichte" badge="EMPFOHLEN"><Slider labels={['Sehr ruhig','Entspannt','Ausgewogen','Voll','Intensiv']} value={trip.match.pace} onChange={v=>setMatch('pace',v)} dim="2"/></Field>
            <Field label="Allein vs. Gesellschaft" badge="EMPFOHLEN"><Slider labels={['Zurückgezogen','Privat','Mix','Sozial','Sehr gesellig']} value={trip.match.solitude_social} onChange={v=>setMatch('solitude_social',v)} dim="3"/></Field>
            <Field label="Komfort-Niveau" badge="EMPFOHLEN"><Slider labels={['Einfach','Solide','Komfortabel','Premium','Luxus']} value={trip.match.comfort} onChange={v=>setMatch('comfort',v)} dim="4"/></Field>
            <Field label="Kulturelle Tiefe" badge="EMPFOHLEN"><Slider labels={['Keine','Touch-Points','Solide','Tief','Immersiv']} value={trip.match.cultural_depth} onChange={v=>setMatch('cultural_depth',v)} dim="5"/></Field>

            <Field label="Aktiv vs. Entspannt" badge="EMPFOHLEN"><Slider labels={['Entspannt','Ruhig','Ausgewogen','Aktiv','Sehr aktiv']} value={trip.match.activity_mode} onChange={v=>setMatch('activity_mode',v)} dim="6"/></Field>
            <Field label="Insider-Tiefe" badge="EMPFOHLEN"><Slider labels={['Klassisch','Bekannt','Geheimtipp-Mix','Off-the-path','Versteckt']} value={trip.match.authenticity} onChange={v=>setMatch('authenticity',v)} dim="7"/></Field>
            {/* v0.14.1: Trust-Signale-Mehrfachauswahl entfernt, ersetzt durch eine einzelne Checkbox.
                Datenseitig bleibt das Array trust_signale erhalten (Backend-kompatibel) — es enthält

            <Field label="Individuelles Beratungsgespräch möglich" badge="EMPFOHLEN" hint="Wenn aktiviert, signalisiert das Reisenden, dass sie Fragen vorab persönlich klären können.">

                <span style={{fontSize:13}}>Ja, Vorabgespräch möglich</span>
              </label>

            <div style={{marginTop:24,paddingTop:20,borderTop:'1px dashed var(--sage-light)'}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--sage-dark)',marginBottom:4,fontFamily:"'Playfair Display',Georgia,serif"}}>💛 Emotionaler Charakter — von dir gepflegt</div>
              <div style={{fontSize:11,color:'#888',fontStyle:'italic',marginBottom:14}}>Diese Angaben kann die KI nicht aus deinen Texten ableiten — sie beschreiben die Atmosphäre, die du als Whisperer schaffst.</div>

              <Field label="Tonalität der Begegnungen" badge="EMPFOHLEN" hint="Wie fühlen sich Gespräche und Begegnungen auf deiner Reise an?">
                <Slider labels={TONALITAET_LABELS} value={trip.emo_tonalitaet} onChange={v=>setT('emo_tonalitaet',v)} dim="EMO1"/>

              </Field>
            </div>
          </div>

        <Section title="KI-Vorschläge zur emotionalen Wirkung" icon="🤖" open={openSections.emotional_ki} onToggle={()=>toggleSection('emotional_ki')}>

              <div style={{display:'flex',alignItems:'center',gap:10,fontFamily:"'Playfair Display',Georgia,serif",fontSize:15,fontWeight:600,color:'var(--coral)'}}>
                <span>🤖 Aus deinen Texten extrahiert</span>
              </div>
              <span style={{fontSize:11,color:isAnalysed?'var(--green)':'#888',fontStyle:isAnalysed?'normal':'italic'}}>
                {analyseStatus==='loading'?'⏳ Analyse läuft…':
                 analyseStatus==='error'?'⚠ '+analyseMsg:
                 isAnalysed?('✓ analysiert'+(trip.analyse_emotional_at?' · '+new Date(trip.analyse_emotional_at).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'')):
                 'Noch nicht analysiert'}
              </span>
            </div>

            {!isAnalysed&&analyseStatus!=='loading'&&(
              <div style={{textAlign:'center',padding:'20px 12px',color:'#666',fontSize:13}}>

                <button onClick={()=>runEmotionalAnalysis(false)} disabled={!entwurfId} style={{background:entwurfId?'var(--coral)':'#CCC',color:'var(--white)',border:'none',padding:'10px 24px',borderRadius:6,fontSize:13,fontWeight:600,cursor:entwurfId?'pointer':'not-allowed',fontFamily:'inherit'}}>🤖 Analyse starten</button>
                {!entwurfId&&<div style={{fontSize:11,color:'#999',marginTop:8,fontStyle:'italic'}}>Bitte zuerst Entwurf speichern.</div>}
                {EMOTIONAL_ANALYSE_MOCK&&<div style={{fontSize:10,color:'#999',marginTop:10,fontStyle:'italic',letterSpacing:0.5}}>🧪 Demo-Modus aktiv — echte Backend-Analyse über /analyse-emotional sobald Endpoint bereit</div>}
              </div>
            )}

            {analyseStatus==='loading'&&(
              <div style={{textAlign:'center',padding:'20px 12px',color:'#666',fontSize:13}}>
                <div style={{display:'inline-block',width:14,height:14,border:'2px solid rgba(224,122,95,0.3)',borderTopColor:'var(--coral)',borderRadius:'50%',animation:'ww-spin 0.8s linear infinite',marginRight:8,verticalAlign:'middle'}}></div>
                Texte werden analysiert…
              </div>
            )}

            {isAnalysed&&analyseStatus!=='loading'&&(
              <>
                <Field label="Emotionale Wirkung" badge="KI-VORSCHLAG" hint="Maximal 3 — Reihenfolge zählt. Du kannst Vorschläge bearbeiten.">
                  <MC
                    options={VOC_EMOTIONALE_WIRKUNG}
                    value={Array.isArray(emotionalTags.emotionale_wirkung)?emotionalTags.emotionale_wirkung:[]}
                    onChange={v=>setEmotionalField('emotionale_wirkung',(v||[]).slice(0,3))}
                    columns={2}
