                </Field>

                <Field label="Mentale Wirkung" badge="KI-VORSCHLAG" hint="Maximal 2.">
                  <MC
                    options={VOC_MENTALE_WIRKUNG}
                    value={Array.isArray(emotionalTags.mentale_wirkung)?emotionalTags.mentale_wirkung:[]}
                    onChange={v=>setEmotionalField('mentale_wirkung',(v||[]).slice(0,2))}
                    columns={3}
                  />
                </Field>

                <Field label="Archetyp — innere Reise-Geschichte" badge="KI-VORSCHLAG">
                  <Radio
                    options={VOC_ARCHETYP}
                    value={emotionalTags.archetyp||''}
                    onChange={v=>setEmotionalField('archetyp',v)}
                    name="archetyp"
                  />
                </Field>

                {/* Klasse B — deterministisch im Backend, hier nur Read-Only-Vorschau */}
                <div style={{marginTop:18,padding:'12px 14px',background:'rgba(122,139,111,0.06)',borderRadius:6,borderLeft:'3px solid var(--sage-light)',fontSize:11,color:'#666'}}>
                  <div style={{fontWeight:600,color:'var(--sage-dark)',marginBottom:6}}>Automatisch abgeleitet aus deinen Slidern (keine UI-Eingabe nötig)</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {Array.isArray(emotionalTags.energieprofil)&&emotionalTags.energieprofil.length>0&&(
                      <span style={{background:'var(--white)',border:'1px solid var(--sage-light)',borderRadius:10,padding:'2px 9px',fontSize:10,color:'var(--sage-dark)'}}>Energieprofil: {emotionalTags.energieprofil.join(', ')}</span>
                    )}
                    {Array.isArray(emotionalTags.erlebnisstil)&&emotionalTags.erlebnisstil.length>0&&(
                      <span style={{background:'var(--white)',border:'1px solid var(--sage-light)',borderRadius:10,padding:'2px 9px',fontSize:10,color:'var(--sage-dark)'}}>Erlebnisstil: {emotionalTags.erlebnisstil.join(', ')}</span>
                    )}
                    {Array.isArray(emotionalTags.koerperliche_wirkung)&&emotionalTags.koerperliche_wirkung.length>0&&(
                      <span style={{background:'var(--white)',border:'1px solid var(--sage-light)',borderRadius:10,padding:'2px 9px',fontSize:10,color:'var(--sage-dark)'}}>Körperliche Wirkung: {emotionalTags.koerperliche_wirkung.join(', ')}</span>
                    )}
                  </div>
                </div>

                <div style={{marginTop:16,textAlign:'center'}}>
                  <button onClick={()=>runEmotionalAnalysis(false)} disabled={!entwurfId||analyseStatus==='loading'} style={{background:'var(--white)',color:'var(--coral)',border:'1px solid var(--coral)',padding:'8px 18px',borderRadius:6,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>↻ Analyse erneut laufen lassen</button>
                </div>
              </>
            )}
          </div>
        </Section>

        <Section title="Persönliche Erfahrung" icon="💬" open={openSections.persoenlich} onToggle={()=>toggleSection('persoenlich')}>
          <Field label="Persönliche Erfahrung" badge="PFLICHT"><TA placeholder="Wann warst du dort? Was war das Besondere?" rows={4} value={trip.persoenliche_erfahrung} onChange={v=>setT('persoenliche_erfahrung',v)}/></Field>
          <Field label="Magic Moment" badge="EMPFOHLEN"><TA placeholder="Das eine Erlebnis, das diese Reise einzigartig macht..." rows={3} value={trip.magic_moment} onChange={v=>setT('magic_moment',v)}/></Field>
          <Field label="Sicherheitshinweise" badge="EMPFOHLEN"><TA placeholder="Risiken, Einschränkungen..." rows={2} value={trip.sicherheitshinweise} onChange={v=>setT('sicherheitshinweise',v)}/></Field>
        </Section>
        </fieldset>
      </>}

      {/* TAGE TAB */}
      {!showJson&&tab==='tage'&&<>
        {/* v0.12: Status-Hinweisbanner für Tage-Tab */}
        {!isEditableStatus(tripStatus)&&<div style={{background:'#FFF4E5',border:'1px solid var(--coral)',color:'var(--anthrazit)',padding:'12px 16px',borderRadius:8,marginBottom:16,fontSize:13,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <span style={{fontSize:18}}>🔒</span>
          <span><strong>Status: {STATUS_LABELS[tripStatus]||tripStatus}</strong> — diese Reise ist nicht mehr editierbar.</span>
        </div>}
        {/* v0.13: Reject-Banner auch im Tage-Tab */}
        {isEditableStatus(tripStatus)&&rejectComment&&<div style={{background:'#FDECEA',border:'1px solid var(--red)',color:'var(--anthrazit)',padding:'12px 16px',borderRadius:8,marginBottom:16,fontSize:13}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6,fontWeight:700,color:'var(--red)'}}>
            <span style={{fontSize:18}}>↩</span>
            <span>Diese Reise wurde zurückgewiesen — bitte überarbeiten und erneut übergeben.</span>
          </div>
          <div style={{whiteSpace:'pre-wrap',background:'var(--white)',border:'1px solid #E0E0E0',borderRadius:6,padding:'8px 12px',marginTop:6,color:'var(--anthrazit)',fontSize:12}}>
            <strong style={{fontSize:11,color:'#888',display:'block',marginBottom:4}}>Begründung:</strong>
            {rejectComment}
          </div>
        </div>}
        <fieldset disabled={!isEditableStatus(tripStatus)} style={{border:'none',padding:0,margin:0,minWidth:0}}>
        <div style={{background:'var(--sage-light)',padding:14,borderRadius:8,marginTop:16,marginBottom:16,fontSize:12}}>
          <strong>{tage.length} Tag(e)</strong> angelegt. Klick auf einen Tag zum Bearbeiten. Mit ↑↓ kannst du Tage und Einträge umsortieren, mit ✕ löschen. Hotels werden aus dem Pool (Reise-Ebene) zugeordnet.
        </div>
        {tage.map((tag,ti)=>{
          const open=openTags[ti]||false;
          const toggleOpen=()=>setOpenTags(p=>({...p,[ti]:!p[ti]}));
          // v0.14.2: Stop-Propagation für Header-Buttons, damit Klicks auf ↑↓✕ den Tag nicht zuklappen.
          const stop=(e)=>e.stopPropagation();
          const headerBtn=(disabled)=>({
            background:'var(--white)',
            border:'1px solid #D0D0D0',
            borderRadius:4,
            width:26,height:26,
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:13,
            color:disabled?'#CCC':'#666',
            cursor:disabled?'not-allowed':'pointer',
            padding:0,lineHeight:1
          });
          return <div key={ti} style={{border:`1px solid ${open?'var(--sage)':'#D0D0D0'}`,borderRadius:8,marginBottom:8,overflow:'hidden'}}>
            <div onClick={toggleOpen} style={{padding:'10px 16px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',background:open?'var(--sage-light)':'var(--beige-light)',gap:8}}>
              <span style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:14,fontWeight:600,flex:1,minWidth:0}}>Tag {tag.tag_nummer}{tag.tag_titel?' — '+tag.tag_titel:''}</span>
              {/* v0.14.2: Tag-Reorder + Tag-Lösch im Header. */}
              <div onClick={stop} style={{display:'flex',gap:4,alignItems:'center'}}>
                <button type="button" onClick={()=>moveTag(ti,-1)} disabled={ti===0} title="Tag nach oben" style={headerBtn(ti===0)}>↑</button>
                <button type="button" onClick={()=>moveTag(ti,1)} disabled={ti===tage.length-1} title="Tag nach unten" style={headerBtn(ti===tage.length-1)}>↓</button>
                <button type="button" onClick={()=>removeTag(ti)} title="Tag löschen" style={{...headerBtn(false),color:'var(--red)'}}>✕</button>
              </div>
              {tag.tag_typ&&<span style={{fontSize:11,color:'var(--sage)',background:'var(--white)',padding:'2px 8px',borderRadius:4}}>{tag.tag_typ}</span>}
              <span style={{fontSize:18,color:'var(--sage)'}}>{open?'▾':'▸'}</span>
            </div>
            {open&&<div style={{padding:16}}>
              <div className="field-row" style={{display:'flex',flexWrap:'wrap',gap:16}}>
                <Field label="Tag-Typ" badge="PFLICHT" half><Sel options={tagTypenOpts} value={tag.tag_typ} onChange={v=>updateTag(ti,'tag_typ',v)}/></Field>
                <Field label="Tag-Titel" badge="EMPFOHLEN" half><TI placeholder="z.B. Die weißen Dörfer" value={tag.tag_titel} onChange={v=>updateTag(ti,'tag_titel',v)}/></Field>
              </div>
              <div className="field-row" style={{display:'flex',flexWrap:'wrap',gap:16}}>
                <Field label="Empf. Tagesstart" badge="EMPFOHLEN" half><TI placeholder="z.B. ca. 14:00" value={tag.tag_start} onChange={v=>updateTag(ti,'tag_start',v)}/></Field>
                <Field label="Hotel für diese Nacht" badge="EMPFOHLEN" half><Sel options={trip.hotels.filter(h=>h.name).map(h=>({value:h.ref,label:`Hotel ${h.ref} — ${h.name}`}))} value={tag.hotel_ref} onChange={v=>updateTag(ti,'hotel_ref',v)}/></Field>
              </div>

              <InsiderField number={2} title="Deine Tages-Story & Tipps (F2)" hint="Was macht diesen Tag besonders? Highlights, Tipps, Hinweis für morgen..." placeholder="Stichworte zum Tag..." value={tag.tag_story} onChange={v=>updateTag(ti,'tag_story',v)} rows={4}/>

              {/* v0.14.3: Eine kombinierte Tagesablauf-Liste statt drei separater Sektionen.
                  Items aus stopps/restaurants/aktivitaeten werden nach position sortiert,
                  beliebig gemischt anzeigbar (z.B. Aktivität, Frühstück, Stopp, Stopp, Mittag, Aktivität, ...).
                  Akkordeon-Modus: openItem trackt das eine offene Item pro Tag. */}
              <div style={{fontSize:13,fontFamily:"'Playfair Display',Georgia,serif",color:'var(--anthrazit)',fontWeight:700,marginTop:16,marginBottom:8}}>🗓️ Tagesablauf</div>
              {(()=>{
                const schedule=getSortedSchedule(tag);
                if(schedule.length===0){
                  return <div style={{fontSize:12,color:'#888',fontStyle:'italic',textAlign:'center',padding:'8px 0',marginBottom:8}}>Noch keine Einträge — füge unten Stopps, Food/Drinks oder Aktivitäten hinzu.</div>;
                }
                return schedule.map((entry,pos)=>{
                  const cur=openItem[ti];
                  const isOpen=!!(cur&&cur.type===entry.type&&cur.idx===entry.idx);
                  const canUp=pos>0;
                  const canDown=pos<schedule.length-1;
                  const onMoveUp=()=>moveItem(ti,entry.type,entry.idx,-1);
                  const onMoveDown=()=>moveItem(ti,entry.type,entry.idx,1);
                  const onToggle=()=>toggleItem(ti,entry.type,entry.idx);
                  const key=`${entry.type}-${entry.idx}`;

                  if(entry.type==='stopp'){
                    const s=entry.item;const si=entry.idx;
                    return <SubItemRow
                      key={key}
                      icon="📍"
                      label="Stopp"
                      namePlaceholder="Name"
                      nameValue={s.name}
                      onNameChange={v=>updateStopp(ti,si,'name',v)}
                      accent="var(--sage)"
                      accentBg="var(--beige-light)"
                      accentBorder="var(--sage-light)"
                      open={isOpen}
                      onToggle={onToggle}
                      onMoveUp={onMoveUp}
                      onMoveDown={onMoveDown}
                      onRemove={()=>removeStopp(ti,si)}
                      canMoveUp={canUp}
                      canMoveDown={canDown}
                    >
                      <Field label="Adresse/Maps" badge="EMPFOHLEN"><TI placeholder="Adresse oder Maps-Link" value={s.adresse} onChange={v=>updateStopp(ti,si,'adresse',v)}/></Field>
                      <div className="field-row" style={{display:'flex',flexWrap:'wrap',gap:12}}>
                        <Field label="Uhrzeit" badge="OPTIONAL" half><TI placeholder="z.B. 09:00" value={s.uhrzeit} onChange={v=>updateStopp(ti,si,'uhrzeit',v)}/></Field>
                        <Field label="Dauer" badge="OPTIONAL" half><Sel options={['30 min','1 Stunde','2 Stunden','3 Stunden','Halber Tag','Ganzer Tag']} value={s.dauer} onChange={v=>updateStopp(ti,si,'dauer',v)}/></Field>
                      </div>
                      <Field label="Insider-Tipps (F3)" badge="EMPFOHLEN" hint="Parkplatz, Laufroute, Historie..."><TA placeholder="Stichworte..." rows={2} value={s.insider_tipps} onChange={v=>updateStopp(ti,si,'insider_tipps',v)}/></Field>
                    </SubItemRow>;
                  }
                  if(entry.type==='food'){
                    const r=entry.item;const ri=entry.idx;
                    return <SubItemRow
                      key={key}
                      icon="🍽️"
                      label="Food/Drink"
                      namePlaceholder="Name (Restaurant, Bar, Café…)"
                      nameValue={r.name}
                      onNameChange={v=>updateRest(ti,ri,'name',v)}
                      accent="var(--coral)"
                      accentBg="var(--beige-light)"
                      accentBorder="var(--coral-light)"
                      open={isOpen}
                      onToggle={onToggle}
                      onMoveUp={onMoveUp}
                      onMoveDown={onMoveDown}
                      onRemove={()=>removeRest(ti,ri)}
                      canMoveUp={canUp}
                      canMoveDown={canDown}
                    >
                      <div className="field-row" style={{display:'flex',flexWrap:'wrap',gap:12}}>
                        <Field label="Mahlzeit/Anlass" badge="EMPFOHLEN" half><Sel options={['Frühstück','Mittag','Abend','Snack/Café','Drinks/Bar']} value={r.mahlzeit} onChange={v=>updateRest(ti,ri,'mahlzeit',v)}/></Field>
                        <Field label="Adresse" badge="OPTIONAL" half><TI placeholder="Adresse oder Maps-Link" value={r.adresse} onChange={v=>updateRest(ti,ri,'adresse',v)}/></Field>
                      </div>
                      <Field label="Warum diese Empfehlung? (F4)" badge="EMPFOHLEN"><TA placeholder="Stichworte: Warum empfehlen, Reservierung, Sitzplatz..." rows={2} value={r.warum} onChange={v=>updateRest(ti,ri,'warum',v)}/></Field>
                    </SubItemRow>;
                  }
                  // entry.type === 'akt'
                  const a=entry.item;const ai=entry.idx;
                  return <SubItemRow
                    key={key}
                    icon="🎭"
                    label="Aktivität"
                    namePlaceholder="z.B. Whale Watching"
                    nameValue={a.name}
                    onNameChange={v=>updateAkt(ti,ai,'name',v)}
                    accent="#7B1FA2"
                    accentBg="#F3E8FF"
                    accentBorder="#9C27B0"
                    open={isOpen}
                    onToggle={onToggle}
                    onMoveUp={onMoveUp}
                    onMoveDown={onMoveDown}
                    onRemove={()=>removeAkt(ti,ai)}
                    canMoveUp={canUp}
                    canMoveDown={canDown}
                  >
                    <div className="field-row" style={{display:'flex',flexWrap:'wrap',gap:12}}>
                      <Field label="Anbieter" badge="EMPFOHLEN" half><TI placeholder="z.B. firmm" value={a.anbieter} onChange={v=>updateAkt(ti,ai,'anbieter',v)}/></Field>
                      <Field label="Telefon" badge="OPTIONAL" half><TI placeholder="+34 ..." value={a.telefon} onChange={v=>updateAkt(ti,ai,'telefon',v)}/></Field>
                    </div>
                    <Field label="Adresse" badge="OPTIONAL"><TI placeholder="Adresse oder Maps-Link" value={a.adresse} onChange={v=>updateAkt(ti,ai,'adresse',v)}/></Field>
                    <Field label="Insider-Tipps (F5)" badge="EMPFOHLEN"><TA placeholder="Wetterabhängig? Buchung nötig? Worauf achten?" rows={2} value={a.insider_tipps} onChange={v=>updateAkt(ti,ai,'insider_tipps',v)}/></Field>
                  </SubItemRow>;
                });
              })()}
              {/* v0.14.3: Drei Add-Buttons unten — neuer Eintrag landet ans Ende des Tagesablaufs (höchste position+1). */}
              <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center',marginTop:8}}>
                <button onClick={()=>addStopp(ti)} style={{background:'none',border:'1px dashed var(--sage)',borderRadius:6,padding:'4px 14px',color:'var(--sage)',cursor:'pointer',fontSize:12}}>📍 + Stopp</button>
                <button onClick={()=>addRest(ti)} style={{background:'none',border:'1px dashed var(--coral)',borderRadius:6,padding:'4px 14px',color:'var(--coral)',cursor:'pointer',fontSize:12}}>🍽️ + Food/Drink</button>
                <button onClick={()=>addAkt(ti)} style={{background:'none',border:'1px dashed #9C27B0',borderRadius:6,padding:'4px 14px',color:'#9C27B0',cursor:'pointer',fontSize:12}}>🎭 + Aktivität</button>
              </div>
            </div>}
          </div>;})}
        <div style={{textAlign:'center',marginTop:12}}><button onClick={addTag} style={{background:'var(--sage)',color:'var(--white)',border:'none',padding:'10px 24px',borderRadius:8,fontSize:14,cursor:'pointer'}}>+ Tag hinzufügen</button></div>
        </fieldset>
      </>}

      {/* v0.14: Footer ist tab-abhängig — saubere Trennung Whisperer ↔ Reisen.
          Im Whisperer-Tab werden ausschließlich Profil-Aktionen angeboten (Sage-getönt).
          In den Reise-Tabs (trip, tage) bleiben die Reise-Aktionen (neutral).
          showJson schaltet den Footer komplett ab (wie bisher). */}
      {!showJson&&tab==='whisperer'&&<div style={{marginTop:40,padding:'16px',borderTop:'2px solid var(--sage-light)',background:'rgba(122,139,111,0.08)',borderRadius:'0 0 8px 8px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          {whisperer.whisperer_id&&<span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 10px',background:'var(--white)',border:'1px solid var(--sage-light)',borderRadius:4,fontSize:11,fontWeight:600,color:'var(--sage-dark)'}}>{whisperer.whisperer_id}</span>}
          {whispererStatus==='saving'&&<><span className="status-dot" style={{background:'#FFC107'}}></span><span style={{fontSize:12,color:'#FFC107'}}>{whispererMsg}</span></>}
          {whispererStatus==='success'&&<><span className="status-dot" style={{background:'#4CAF50'}}></span><span style={{fontSize:12,color:'#4CAF50'}}>{whispererMsg}</span></>}
          {whispererStatus==='error'&&<><span className="status-dot" style={{background:'#D32F2F'}}></span><span style={{fontSize:12,color:'#D32F2F'}}>{whispererMsg}</span></>}
          {/* v0.14: Pflicht-Legende */}
          <span style={{fontSize:11,color:'#888',marginLeft:'auto'}}><span style={{color:'var(--red)',fontWeight:700}}>*</span> = Pflichtfeld</span>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {/* canManage: Admin/Master kann fremdes Profil laden — user_id-Input wandert mit dem Button hierher. */}
          {canManage&&<input
            placeholder="Fremde user_id (leer = eigenes)"
            value={adminLoadUserId}
            onChange={e=>setAdminLoadUserId(e.target.value)}
            title="Nur sichtbar für Admin/Master: User-ID eintippen, um ein fremdes Whisperer-Profil zu laden. Leer lassen für das eigene Profil."
            style={{...iStyle,width:200,padding:'8px 10px',fontSize:12}}
          />}
          <button onClick={handleWhispererLoad} style={{background:'var(--white)',color:'var(--sage)',border:'2px solid var(--sage)',padding:'10px 18px',borderRadius:8,fontSize:14,cursor:'pointer',fontWeight:600}}>📥 Profil laden</button>
          <button onClick={handleWhispererSave} style={{background:'var(--sage)',color:'var(--white)',border:'none',padding:'10px 20px',borderRadius:8,fontSize:14,cursor:'pointer',fontWeight:600}}>💾 Profil speichern</button>
        </div>
      </div>}

      {/* Reise-Footer — sichtbar in trip + tage, NICHT im Whisperer-Tab und nicht im JSON-View. */}
      {!showJson&&(tab==='trip'||tab==='tage')&&<div style={{marginTop:40,padding:'16px 0',borderTop:'2px solid var(--sage-light)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          {/* v0.12: Status-Badge */}
          <span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 10px',background:'var(--white)',border:'1px solid #E0E0E0',borderRadius:4,fontSize:11,fontWeight:600,color:'var(--anthrazit)'}}>
            <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:STATUS_COLORS[tripStatus]||'#888'}}></span>
            <span style={{textTransform:'uppercase',letterSpacing:0.5}}>{STATUS_LABELS[tripStatus]||tripStatus||'—'}</span>
          </span>
          {/* Save-Status */}
          {saveStatus==='saving'&&<><span className="status-dot" style={{background:'#FFC107'}}></span><span style={{fontSize:12,color:'#FFC107'}}>{saveMsg}</span></>}
          {saveStatus==='success'&&<><span className="status-dot" style={{background:'#4CAF50'}}></span><span style={{fontSize:12,color:'#4CAF50'}}>{saveMsg}</span></>}
          {saveStatus==='error'&&<><span className="status-dot" style={{background:'#D32F2F'}}></span><span style={{fontSize:12,color:'#D32F2F'}}>{saveMsg}</span></>}
          {/* Transfer-Status */}
          {transferStatus==='saving'&&<><span className="status-dot" style={{background:'#FFC107'}}></span><span style={{fontSize:12,color:'#FFC107'}}>{transferMsg}</span></>}
          {transferStatus==='success'&&<><span className="status-dot" style={{background:'#4CAF50'}}></span><span style={{fontSize:12,color:'#4CAF50'}}>{transferMsg}</span></>}
          {transferStatus==='error'&&<><span className="status-dot" style={{background:'#D32F2F'}}></span><span style={{fontSize:12,color:'#D32F2F'}}>{transferMsg}</span></>}
          {/* v0.14: Pflicht-Legende */}
          <span style={{fontSize:11,color:'#888',marginLeft:6}}><span style={{color:'var(--red)',fontWeight:700}}>*</span> = Pflichtfeld</span>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {/* v0.12: Lade-Modal-Trigger (ersetzt das primitive ENT-…-Eingabefeld) */}
          <button onClick={openLoadModal} style={{background:'var(--white)',color:'var(--sage)',border:'2px solid var(--sage)',padding:'10px 18px',borderRadius:8,fontSize:14,cursor:'pointer',fontWeight:600}}>📂 Laden</button>
          {/* v0.14: { } JSON-Button entfernt. JSON-Vorschau ist nur noch über Admin-Modus 'preview' im Save-Handler erreichbar. */}
          {/* v0.12/0.13: Speichern + Übergeben nur sichtbar bei editierbarem Status (entwurf/draft) UND vorhandener entwurfId.
              Bei leerer entwurfId (Bug-#2-Fall: Deep-Link auf nicht-zugreifbare ID) sind beide Buttons disabled. */}
          {isEditableStatus(tripStatus)&&<>
            <button onClick={handleSave} disabled={!entwurfId} title={!entwurfId?'Bitte zuerst eine Reise laden oder neu anlegen':''} style={{background:entwurfId?'var(--white)':'#F0F0F0',color:entwurfId?'var(--sage)':'#999',border:'2px solid '+(entwurfId?'var(--sage)':'#CCC'),padding:'10px 20px',borderRadius:8,fontSize:14,cursor:entwurfId?'pointer':'not-allowed',fontWeight:600}}>{'💾 Speichern'}</button>
            {/* v0.15: Analyse-Button — sichtbar wenn Entwurf existiert und Reise editierbar ist.
                Triggert manuell den emotionalen Analyse-WF. Beim Klick auf "Übergeben" ohne vorherige
                Analyse erscheint ein Confirm-Dialog (siehe handleTransfer + showAnalyseConfirm). */}
            <button onClick={()=>runEmotionalAnalysis(false)} disabled={!entwurfId||analyseStatus==='loading'} title={!entwurfId?'Bitte zuerst speichern':'KI extrahiert emotionale Tags aus deinen Texten'} style={{background:entwurfId?'var(--white)':'#F0F0F0',color:entwurfId?'var(--coral)':'#999',border:'2px solid '+(entwurfId?'var(--coral)':'#CCC'),padding:'10px 18px',borderRadius:8,fontSize:14,cursor:(entwurfId&&analyseStatus!=='loading')?'pointer':'not-allowed',fontWeight:600,display:'flex',alignItems:'center',gap:6}}>
              {analyseStatus==='loading'
                ? <><span style={{display:'inline-block',width:12,height:12,border:'2px solid rgba(224,122,95,0.3)',borderTopColor:'var(--coral)',borderRadius:'50%',animation:'ww-spin 0.8s linear infinite'}}></span>Analyse…</>
                : <>🤖 {isAnalysed?'Analyse erneut':'Analyse starten'}</>}
            </button>
            <button onClick={handleTransfer} disabled={!entwurfId} title={!entwurfId?'Bitte zuerst speichern':''} style={{background:entwurfId?'var(--coral)':'#CCC',color:'var(--white)',border:'none',padding:'10px 24px',borderRadius:8,fontSize:14,cursor:entwurfId?'pointer':'not-allowed',fontWeight:600}}>→ Übergeben</button>
          </>}
          {/* v0.13: Reject-Button — sichtbar bei canManage UND status='übergeben'. Öffnet Reject-Modal mit Pflicht-Begründung. */}
          {canManage&&tripStatus==='übergeben'&&<button onClick={openRejectModal} style={{background:'var(--white)',color:'var(--red)',border:'2px solid var(--red)',padding:'10px 20px',borderRadius:8,fontSize:14,cursor:'pointer',fontWeight:600}}>↩ Zurückweisen</button>}
          {/* v0.13: Generate-Button als deaktivierter Platzhalter (Stufe 3). Position/Platz sichtbar,
              Klick gesperrt, Tooltip erklärt warum. Aktivierung erfolgt mit WF3-Bereitschaft. */}
          {canManage&&tripStatus==='übergeben'&&<button disabled title="Generieren wird mit WF3-Produktionsfreigabe aktiviert (kommt in Stufe 3)" style={{background:'#E8E8E8',color:'#999',border:'2px dashed #BBB',padding:'10px 20px',borderRadius:8,fontSize:14,cursor:'not-allowed',fontWeight:600,fontFamily:'inherit'}}>⚡ Generieren <span style={{fontSize:9,fontWeight:700,marginLeft:6,padding:'1px 6px',background:'#BBB',color:'var(--white)',borderRadius:3,letterSpacing:0.5}}>BALD</span></button>}
        </div>
      </div>}

      {/* v0.12: LADE-MODAL — Liste eigener / aller Reisen */}
      {showLoadModal&&<div onClick={closeLoadModal} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:'var(--white)',borderRadius:12,maxWidth:820,width:'100%',maxHeight:'90vh',display:'flex',flexDirection:'column',boxShadow:'0 10px 40px rgba(0,0,0,0.2)'}}>
          <div style={{padding:'16px 20px',borderBottom:'2px solid var(--sage-light)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
            <div>
              <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:20,color:'var(--sage-dark)',fontWeight:700}}>Reise laden</div>
              <div style={{fontSize:12,color:'#888',marginTop:2}}>{canManage?'Alle Reisen (Admin/Master-Sicht)':'Deine Reisen'}</div>
            </div>
            <button onClick={closeLoadModal} title="Schließen" style={{background:'transparent',border:'1px solid #D0D0D0',borderRadius:6,padding:'6px 12px',fontSize:13,cursor:'pointer',color:'#666'}}>✕ Schließen</button>
          </div>
          {/* v0.13: Status-Filter-Tabs — nur für canManage. Curator sieht keine Tabs (filtert nicht). */}
          {canManage&&<div style={{padding:'10px 20px',borderBottom:'1px solid #E8E8E8',display:'flex',gap:6,flexWrap:'wrap',background:'var(--beige-light)'}}>
            {[
              {k:'alle',label:'Alle'},
              {k:'entwurf',label:'Entwurf'},
              {k:'rejected',label:'Zurückgewiesen'},
              {k:'übergeben',label:'Übergeben'},
              {k:'in_generierung',label:'In Generierung'},
              {k:'veröffentlicht',label:'Veröffentlicht'},
              {k:'fehler',label:'Fehler'}
            ].map(t=>{
              // Zähler pro Tab — gibt dem Master ein Gefühl für seine Inbox.
              // v0.13.1: 'rejected' ist Pseudo-Status für Reisen mit Status entwurf/draft + nicht-leerem reject_comment.
              const cnt=t.k==='alle'?loadList.length:loadList.filter(d=>{
                const s=d.status||'entwurf';
                if(t.k==='rejected') return (s==='entwurf'||s==='draft')&&!!(d.reject_comment&&String(d.reject_comment).trim());
                if(t.k==='entwurf') return (s==='entwurf'||s==='draft')&&!(d.reject_comment&&String(d.reject_comment).trim());
                return s===t.k;
              }).length;
              const active=loadFilter===t.k;
              return <button key={t.k} onClick={()=>setLoadFilter(t.k)} style={{background:active?'var(--sage)':'var(--white)',color:active?'var(--white)':'var(--anthrazit)',border:'1px solid '+(active?'var(--sage)':'#D0D0D0'),padding:'6px 12px',borderRadius:6,fontSize:12,cursor:'pointer',fontWeight:active?700:500,display:'inline-flex',alignItems:'center',gap:6,fontFamily:'inherit'}}>
                {t.label}
                <span style={{fontSize:10,padding:'1px 6px',background:active?'rgba(255,255,255,0.25)':'#EEE',color:active?'var(--white)':'#888',borderRadius:3,fontWeight:700,minWidth:18,textAlign:'center'}}>{cnt}</span>
              </button>;
            })}
          </div>}
          <div style={{flex:1,overflowY:'auto',padding:16}}>
            {loadListLoading&&<div style={{textAlign:'center',padding:40,color:'#888',fontSize:13}}>Lade Reisen…</div>}
            {!loadListLoading&&loadListError&&<div style={{padding:16,background:'#FFEBEE',color:'#D32F2F',borderRadius:8,fontSize:13}}>Fehler: {loadListError}</div>}
            {!loadListLoading&&!loadListError&&loadList.length===0&&<div style={{textAlign:'center',padding:40,color:'#888',fontSize:13}}>Keine Reisen vorhanden. Lege über das Formular eine neue Reise an und klicke „Speichern".</div>}
            {!loadListLoading&&!loadListError&&loadList.length>0&&(()=>{
              // v0.13: Filterung nach Status-Tab (nur canManage hat Tabs aktiv).
              // v0.13.1: 'rejected' = entwurf/draft mit reject_comment; 'entwurf' = entwurf/draft OHNE reject_comment.
              const filtered=loadList.filter(d=>{
                if(!canManage||loadFilter==='alle') return true;
                const s=d.status||'entwurf';
                const hasReject=!!(d.reject_comment&&String(d.reject_comment).trim());
                if(loadFilter==='rejected') return (s==='entwurf'||s==='draft')&&hasReject;
                if(loadFilter==='entwurf') return (s==='entwurf'||s==='draft')&&!hasReject;
                return s===loadFilter;
              });
              if(filtered.length===0) return <div style={{textAlign:'center',padding:40,color:'#888',fontSize:13}}>Keine Reisen im Filter „{loadFilter}".</div>;
              return <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {filtered.map(d=>{
                  const ort=(d.params&&(d.params.reise_ort||d.params.destination))||'(ohne Titel)';
                  const tage=d.anzahl_tage||(d.params&&d.params.anzahl_tage)||'?';
                  const updated=d.updated_at?new Date(d.updated_at).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
                  const stat=d.status||'entwurf';
                  const isDeleting=deletingId===d.entwurf_id;
                  // v0.13.1: Reject-Markierung — gilt nur, wenn Status entwurf/draft IST und reject_comment NICHT leer ist.
                  const rejectCmt=d.reject_comment&&String(d.reject_comment).trim()?String(d.reject_comment).trim():'';
                  const isRejected=(stat==='entwurf'||stat==='draft')&&rejectCmt;
                  return <div key={d.entwurf_id} style={{background:d.entwurf_id===entwurfId?'var(--sage-light)':isRejected?'#FDECEA':'var(--beige-light)',border:'1px solid '+(d.entwurf_id===entwurfId?'var(--sage)':isRejected?'var(--red)':'#E0E0E0'),borderRadius:8,padding:'12px 14px',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,flexWrap:'wrap',opacity:isDeleting?0.5:1,transition:'opacity 0.2s'}}>
                    <button onClick={()=>pickDraftFromList(d.entwurf_id)} disabled={isDeleting} style={{flex:1,minWidth:200,textAlign:'left',background:'transparent',border:'none',padding:0,cursor:isDeleting?'wait':'pointer',fontFamily:'inherit',color:'var(--anthrazit)'}}>
                      <div style={{fontSize:14,fontWeight:600,color:'var(--anthrazit)',marginBottom:4,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                        <span>{ort}</span>
                        {/* v0.13.1: Reject-Markierung im Titel */}
                        {isRejected&&<span title={rejectCmt} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',background:'var(--red)',color:'var(--white)',borderRadius:3,fontSize:9,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase'}}>↩ Zurückgewiesen</span>}
                      </div>
                      <div style={{fontSize:11,color:'#666',display:'flex',gap:10,flexWrap:'wrap'}}>
                        <span>📅 {tage} Tage</span>
                        {updated&&<span>🕒 {updated}</span>}
                        {canManage&&d.user_name&&<span>👤 {d.user_name}</span>}
                        <span style={{fontFamily:'monospace',fontSize:10,color:'#999'}}>{d.entwurf_id}</span>
                      </div>
                      {/* v0.13.1: 2-Zeilen-Reject-Comment-Vorschau, ellipsis bei mehr Text. Volle Begründung im title-Tooltip. */}
                      {isRejected&&<div title={rejectCmt} style={{marginTop:8,padding:'6px 10px',background:'var(--white)',border:'1px solid #E0E0E0',borderRadius:4,fontSize:11,color:'var(--anthrazit)',lineHeight:1.4,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden',textOverflow:'ellipsis'}}>
                        <strong style={{color:'var(--red)',fontSize:10,marginRight:6,textTransform:'uppercase',letterSpacing:0.5}}>Begründung:</strong>
                        {rejectCmt}
                      </div>}
                    </button>
                    <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                      <span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'3px 10px',background:'var(--white)',border:'1px solid #E0E0E0',borderRadius:4,fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:0.5,color:'var(--anthrazit)'}}>
                        <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:STATUS_COLORS[stat]||'#888'}}></span>
                        {STATUS_LABELS[stat]||stat}
                      </span>
                      {/* v0.13: Löschen-Button nur für canManage. Backend-side gilt: veröffentlicht nur Admin. */}
                      {canManage&&<button onClick={()=>handleDeleteDraft(d.entwurf_id)} disabled={isDeleting} title="Entwurf löschen (Soft-Delete)" style={{background:'transparent',border:'1px solid var(--red)',color:'var(--red)',padding:'6px 10px',borderRadius:6,fontSize:11,cursor:isDeleting?'wait':'pointer',fontWeight:600,fontFamily:'inherit'}}>{isDeleting?'…':'🗑'}</button>}
                    </div>
                  </div>;
                })}
              </div>;
            })()}
          </div>
        </div>
      </div>}

      {/* v0.13: REJECT-MODAL — Master/Admin weisen einen übergebenen Entwurf zurück mit Pflichtbegründung */}
      {showRejectModal&&<div onClick={closeRejectModal} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1100,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:'var(--white)',borderRadius:12,maxWidth:560,width:'100%',display:'flex',flexDirection:'column',boxShadow:'0 10px 40px rgba(0,0,0,0.2)'}}>
          <div style={{padding:'16px 20px',borderBottom:'2px solid var(--red)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
            <div>
              <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:20,color:'var(--red)',fontWeight:700}}>↩ Entwurf zurückweisen</div>
              <div style={{fontSize:12,color:'#888',marginTop:2}}>Curator erhält die Reise wieder im Status „Entwurf"</div>
            </div>
            <button onClick={closeRejectModal} disabled={rejectStatus==='saving'} title="Abbrechen" style={{background:'transparent',border:'1px solid #D0D0D0',borderRadius:6,padding:'6px 12px',fontSize:13,cursor:rejectStatus==='saving'?'wait':'pointer',color:'#666',fontFamily:'inherit'}}>✕</button>
          </div>
          <div style={{padding:20,display:'flex',flexDirection:'column',gap:12}}>
            <label style={{fontSize:12,fontWeight:600,color:'var(--anthrazit)'}}>Begründung (Pflicht) — was soll der Curator ändern?</label>
            <textarea
              value={rejectInput}
              onChange={e=>setRejectInput(e.target.value)}
              rows={6}
              placeholder="z.B. Bitte Hotel-Adressen ergänzen und Magic-Moment präziser formulieren."
              disabled={rejectStatus==='saving'}
              style={{...iStyle,minHeight:120,resize:'vertical',fontFamily:'inherit'}}
            />
            {rejectStatus==='error'&&<div style={{padding:10,background:'#FFEBEE',color:'#D32F2F',borderRadius:6,fontSize:12}}>{rejectMsg}</div>}
            {rejectStatus==='success'&&<div style={{padding:10,background:'#E8F5E9',color:'#2E7D32',borderRadius:6,fontSize:12}}>{rejectMsg}</div>}
            {rejectStatus==='saving'&&<div style={{padding:10,background:'#FFF8DC',color:'#B8860B',borderRadius:6,fontSize:12}}>{rejectMsg}</div>}
          </div>
          <div style={{padding:'12px 20px',borderTop:'1px solid #E8E8E8',display:'flex',justifyContent:'flex-end',gap:8,flexWrap:'wrap'}}>
            <button onClick={closeRejectModal} disabled={rejectStatus==='saving'} style={{background:'var(--white)',color:'#666',border:'1px solid #D0D0D0',padding:'10px 18px',borderRadius:8,fontSize:14,cursor:rejectStatus==='saving'?'wait':'pointer',fontWeight:500,fontFamily:'inherit'}}>Abbrechen</button>
            <button onClick={submitReject} disabled={rejectStatus==='saving'||!rejectInput.trim()} style={{background:rejectInput.trim()&&rejectStatus!=='saving'?'var(--red)':'#CCC',color:'var(--white)',border:'none',padding:'10px 22px',borderRadius:8,fontSize:14,cursor:rejectInput.trim()&&rejectStatus!=='saving'?'pointer':'not-allowed',fontWeight:600,fontFamily:'inherit'}}>↩ Zurückweisen</button>
          </div>
        </div>
      </div>}

      {/* v0.15: Confirm-Dialog — Analyse vor Übergabe.
          Erscheint, wenn handleTransfer aufgerufen wird, aber emotional_tags_json leer ist.
          Drei Optionen: Analyse jetzt starten → danach übergeben | Trotzdem übergeben | Abbrechen. */}
      {showAnalyseConfirm&&<div onClick={()=>setShowAnalyseConfirm(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1200,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:'var(--white)',borderRadius:12,maxWidth:520,width:'100%',padding:28,boxShadow:'0 8px 32px rgba(0,0,0,0.2)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <span style={{fontSize:24}}>🤖</span>
            <h3 style={{fontFamily:"'Playfair Display',Georgia,serif",margin:0,fontSize:20,color:'var(--anthrazit)'}}>Emotionale Analyse läuft noch nicht?</h3>
          </div>
          <p style={{color:'#555',fontSize:13,marginBottom:20,lineHeight:1.6}}>
            Die KI hat deine Texte noch nicht analysiert. Mit emotionalen Tags wird deine Reise besser gematcht — möchtest du die Analyse jetzt durchführen?
          </p>
          <div style={{display:'flex',justifyContent:'flex-end',gap:8,flexWrap:'wrap'}}>
            <button onClick={()=>setShowAnalyseConfirm(false)} style={{background:'var(--white)',color:'#666',border:'1px solid #D0D0D0',padding:'10px 16px',borderRadius:8,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>Abbrechen</button>
            <button onClick={async()=>{setShowAnalyseConfirm(false);await doTransfer();}} style={{background:'var(--white)',color:'var(--coral)',border:'1px solid var(--coral)',padding:'10px 16px',borderRadius:8,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>Ohne Analyse übergeben</button>
            <button onClick={async()=>{
              setShowAnalyseConfirm(false);
              const ok=await runEmotionalAnalysis(true);
              if(ok){
                // Kurzer Moment, damit der Whisperer das Ergebnis sieht — dann Übergabe
                setTimeout(()=>{doTransfer();},300);
              }
            }} style={{background:'var(--coral)',color:'var(--white)',border:'none',padding:'10px 20px',borderRadius:8,fontSize:13,cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>🤖 Analyse starten & übergeben</button>
          </div>
        </div>
      </div>}

      {/* v0.15: Analyse-Status-Toast (oben rechts) */}
      {analyseStatus==='loading'&&<div style={{position:'fixed',top:20,right:20,background:'var(--white)',border:'1px solid var(--coral-light)',borderRadius:8,padding:'12px 18px',boxShadow:'0 4px 16px rgba(0,0,0,0.1)',zIndex:1300,fontSize:13,display:'flex',alignItems:'center',gap:10}}>
        <span style={{display:'inline-block',width:14,height:14,border:'2px solid rgba(224,122,95,0.3)',borderTopColor:'var(--coral)',borderRadius:'50%',animation:'ww-spin 0.8s linear infinite'}}></span>
        <span>{analyseMsg||'Analyse läuft…'}</span>
      </div>}
      {analyseStatus==='done'&&<div style={{position:'fixed',top:20,right:20,background:'#E8F5E9',border:'1px solid #6B8E5A',borderRadius:8,padding:'12px 18px',boxShadow:'0 4px 16px rgba(0,0,0,0.1)',zIndex:1300,fontSize:13,color:'#2E7D32'}}>
        ✓ {analyseMsg||'Analyse abgeschlossen.'}
      </div>}
      {analyseStatus==='error'&&<div style={{position:'fixed',top:20,right:20,background:'#FFEBEE',border:'1px solid var(--red)',borderRadius:8,padding:'12px 18px',boxShadow:'0 4px 16px rgba(0,0,0,0.1)',zIndex:1300,fontSize:13,color:'var(--red)'}}>
        ⚠ {analyseMsg||'Analyse-Fehler.'}
      </div>}
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
