// ===================== v0.14.5: IMAGE PROCESSING =====================
// Vor Upload: HEIC→JPEG (iPhone), Resize auf max 1200×1200, JPEG q=0.85.
// Falls Result >500KB, zweiter Pass mit q=0.7. Resultat: Blob + Filename (.jpg).
const PROFILFOTO_MAX_DIM=1200;
const PROFILFOTO_TARGET_BYTES=500*1024;
const PROFILFOTO_MAX_INPUT_BYTES=20*1024*1024; // 20 MB Hard-Limit am Eingang

const isHeic=(file)=>{
  const n=(file.name||'').toLowerCase();
  const t=(file.type||'').toLowerCase();
  return n.endsWith('.heic')||n.endsWith('.heif')||t==='image/heic'||t==='image/heif';
};

const blobToImage=(blob)=>new Promise((resolve,reject)=>{
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{URL.revokeObjectURL(url);resolve(img);};
  img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Bild konnte nicht gelesen werden.'));};
  img.src=url;
});

const canvasToJpegBlob=(canvas,quality)=>new Promise((resolve,reject)=>{
  canvas.toBlob(b=>b?resolve(b):reject(new Error('JPEG-Encoding fehlgeschlagen.')),'image/jpeg',quality);
});

// Liefert {blob, filename}. Wirft bei nicht-Bild-Files oder zu groß am Eingang.
async function processProfilfoto(file){
  if(!file) throw new Error('Keine Datei.');
  if(file.size>PROFILFOTO_MAX_INPUT_BYTES) throw new Error('Datei zu groß (max. 20 MB).');
  let workBlob=file;
  if(isHeic(file)){
    if(typeof window.heic2any!=='function') throw new Error('HEIC-Konverter nicht geladen.');
    const out=await window.heic2any({blob:file,toType:'image/jpeg',quality:0.9});
    workBlob=Array.isArray(out)?out[0]:out;
  }else if(!(file.type||'').startsWith('image/')){
    throw new Error('Datei ist kein Bild (erlaubt: JPG, PNG, WEBP, HEIC).');
  }
  const img=await blobToImage(workBlob);
  let{naturalWidth:w,naturalHeight:h}=img;
  if(!w||!h) throw new Error('Bild hat ungültige Dimensionen.');
  // Proportional auf max PROFILFOTO_MAX_DIM skalieren (nur verkleinern, nicht vergrößern).
  const scale=Math.min(1,PROFILFOTO_MAX_DIM/Math.max(w,h));
  const tw=Math.round(w*scale),th=Math.round(h*scale);
  const cv=document.createElement('canvas');
  cv.width=tw;cv.height=th;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#FFFFFF'; // Falls PNG mit Transparenz: weißer Hintergrund.
  ctx.fillRect(0,0,tw,th);
  ctx.drawImage(img,0,0,tw,th);
  let blob=await canvasToJpegBlob(cv,0.85);
  if(blob.size>PROFILFOTO_TARGET_BYTES){
    blob=await canvasToJpegBlob(cv,0.7);
  }
  // Filename: ursprünglicher Stamm + .jpg, fallback auf 'profilfoto'.
  const stem=(file.name||'profilfoto').replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9_-]+/g,'-').slice(0,40)||'profilfoto';
  const filename=stem+'-'+Date.now()+'.jpg';
  return{blob,filename};
}

// v0.14.3: Normalisiert einen Land-Namen für Fallback-Lookup —
// lowercase, Umlaute/ß ersetzt, Whitespace getrimmt, Mehrfach-Spaces auf einen reduziert.
function normalizeLandName(s){
  if(!s)return '';
  return s.toString().toLowerCase()
    .replace(/ä/g,'a').replace(/ö/g,'o').replace(/ü/g,'u').replace(/ß/g,'ss')
    .replace(/\s+/g,' ').trim();
}

// Heuristisches Parsen der Google formattedAddress. Beispiele:
//   "Calle Larga 12, 29400 Ronda, Málaga, Spanien" → {ort:'Ronda', plz:'29400'}
//   "Plaza Mayor, 11400 Jerez de la Frontera, Spanien" → {ort:'Jerez de la Frontera', plz:'11400'}
function parseGoogleAddress(addr){
  if(!addr) return {ort:'',plz:''};
  const parts=addr.split(',').map(s=>s.trim()).filter(Boolean);
  for(const p of parts){
    const m=p.match(/^(\d{4,6})\s+(.+)$/);
    if(m) return {plz:m[1],ort:m[2].trim()};
  }
  if(parts.length>=3) return {ort:parts[parts.length-3],plz:''};
  if(parts.length>=2) return {ort:parts[parts.length-2],plz:''};
  return {ort:'',plz:''};
}

function safeJson(v,fallback){
  if(v===null||v===undefined||v==='') return fallback;
  if(typeof v==='object') return v;
  try{return JSON.parse(v);}catch{return fallback;}
}

}
function Section({title,icon,open=true,onToggle,children}){const collapsible=!!onToggle;return <div style={{marginTop:28,marginBottom:16}}><div onClick={onToggle} style={{background:'var(--coral)',color:'var(--white)',padding:'10px 16px',borderRadius:open?'8px 8px 0 0':8,fontFamily:"'Playfair Display',Georgia,serif",fontSize:15,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,cursor:collapsible?'pointer':'default',userSelect:'none'}}><span style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:18}}>{icon}</span>{title}</span>{collapsible&&<span style={{fontSize:14,opacity:0.9}}>{open?'▾':'▸'}</span>}</div>{open&&<div style={{padding:'16px 0 4px 0'}}>{children}</div>}</div>;}
function Field({label,badge,hint,children,half}){return <div className={half?'field-half':''} style={{marginBottom:16,flex:half?'1 1 calc(50% - 8px)':'1 1 100%',minWidth:half?200:'auto'}}><div style={{marginBottom:4,display:'flex',alignItems:'center',flexWrap:'wrap',gap:4}}><label style={{fontSize:13,fontWeight:600}}>{label}</label>{badge&&<Badge type={badge}/>}</div>{hint&&<div style={{fontSize:11,color:'#888',marginBottom:4}}>{hint}</div>}{children}</div>;}

function TI({placeholder,value,onChange}){return <input style={iStyle} placeholder={placeholder} value={value||''} onChange={e=>onChange(e.target.value)}/>;}
function TA({placeholder,rows=3,value,onChange}){return <textarea style={{...iStyle,resize:'vertical'}} rows={rows} placeholder={placeholder} value={value||''} onChange={e=>onChange(e.target.value)}/>;}

// Sel/MC/Radio: opts kann Array von Strings ODER Array von {value,label} sein.
const optV=o=>o&&typeof o==='object'?o.value:o;
const optL=o=>o&&typeof o==='object'?o.label:o;
function Sel({options,placeholder,value,onChange}){return <select style={{...iStyle,cursor:'pointer'}} value={value||''} onChange={e=>onChange(e.target.value)}><option value="">{placeholder||'Bitte wählen...'}</option>{(options||[]).map(o=><option key={optV(o)} value={optV(o)}>{optL(o)}</option>)}</select>;}
function MC({options,value=[],onChange,columns=2}){
  // v0.14.7: Optionen können {value,label,disabled,title?} sein, analog zu Radio.
  // Disabled-Optionen sind ausgegraut, nicht klickbar und zeigen optional einen Tooltip.
  const toggle=o=>{
    if(o&&typeof o==='object'&&o.disabled) return;
    const v=optV(o);const next=value.includes(v)?value.filter(x=>x!==v):[...value,v];onChange(next);
  };
  return <div style={{display:'grid',gridTemplateColumns:`repeat(${columns},1fr)`,gap:'4px 16px'}}>{(options||[]).map(o=>{
    const v=optV(o);
    const l=optL(o);
    const disabled=!!(o&&typeof o==='object'&&o.disabled);
    const title=(o&&typeof o==='object'&&o.title)||'';
    return <label key={v} title={title} style={{fontSize:13,display:'flex',alignItems:'center',gap:6,cursor:disabled?'not-allowed':'pointer',padding:'3px 0',color:disabled?'#999':'inherit',opacity:disabled?0.7:1}}>
      <input type="checkbox" checked={value.includes(v)} disabled={disabled} onChange={()=>toggle(o)}/>{l}
    </label>;
  })}</div>;
}
function Radio({options,value,onChange,name}){
  // v0.14.1: Optionen können {value,label,disabled,title?} sein. Disabled-Optionen
  // werden ausgegraut, sind nicht klickbar und zeigen optional einen Tooltip.
  return <div style={{display:'flex',flexWrap:'wrap',gap:8}}>{(options||[]).map(o=>{
    const v=optV(o);
    const l=optL(o);
    const disabled=!!(o&&typeof o==='object'&&o.disabled);
    const title=(o&&typeof o==='object'&&o.title)||'';
    const selected=value===v;
    return <label key={v} title={title} style={{padding:'6px 14px',borderRadius:20,border:`1px solid ${selected?'var(--sage)':'#D0D0D0'}`,background:disabled?'#F0F0F0':(selected?'var(--sage-light)':'var(--white)'),color:disabled?'#999':'var(--anthrazit)',fontSize:13,cursor:disabled?'not-allowed':'pointer',display:'flex',alignItems:'center',gap:4,opacity:disabled?0.7:1}}><input type="radio" name={name} checked={selected} onChange={()=>{if(!disabled)onChange(v);}} disabled={disabled} style={{display:'none'}}/>{l}</label>;
  })}</div>;
}

function Slider({labels,value=3,onChange,dim}){

  // Der dim-Parameter bleibt in der Signatur, wird aber nicht mehr gerendert,

  return <div><div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>{labels.map((l,i)=><span key={i} style={{fontSize:10,color:value===i+1?'var(--coral)':'#AAA',fontWeight:value===i+1?700:400,textAlign:'center',flex:1}}>{l}</span>)}</div><input type="range" min={1} max={5} value={value} onChange={e=>onChange(Number(e.target.value))} style={{width:'100%'}}/></div>;
}

// ===================== v0.14.7: ORDERED TAG PICKER =====================
// Auswahl mit Reihenfolge: Index 0 = Hauptthema. Datenmodell: string[] (Backend-kompatibel).
// Klick auf eine verfügbare Option fügt sie ans Ende der ausgewählten Liste an.
// Verfügbare Pool-Chips für bereits ausgewählte Werte werden ausgeblendet, damit Doppel-Auswahl
// nicht möglich ist. Reihenfolge ändern per ↑/↓, entfernen per ✕.
function OrderedTagPicker({value=[],onChange,options=[],max=3}){
  const arr=Array.isArray(value)?value:[];
  const optMap=Object.fromEntries(options.map(o=>{const v=optV(o);return[v,optL(o)];}));
  const selectedSet=new Set(arr);
  const available=options.filter(o=>!selectedSet.has(optV(o)));
  const full=arr.length>=max;
  const add=(v)=>{if(full||arr.includes(v)) return;onChange([...arr,v]);};
  const removeAt=(i)=>{const n=arr.slice();n.splice(i,1);onChange(n);};
  const moveTo=(from,to)=>{
    if(to<0||to>=arr.length) return;
    const n=arr.slice();const[item]=n.splice(from,1);n.splice(to,0,item);onChange(n);
  };
  return <div>
    {arr.length>0&&<div style={{marginBottom:10,display:'flex',flexDirection:'column',gap:6}}>
      {arr.map((v,i)=><div key={v} style={{display:'flex',alignItems:'center',gap:8,background:'var(--white)',border:'1px solid #D0D0D0',borderRadius:6,padding:'6px 8px'}}>
        <div style={{minWidth:24,fontSize:12,fontWeight:700,color:'var(--sage)',textAlign:'center'}}>{i+1}.</div>
        {i===0&&<div style={{background:'var(--coral)',color:'#fff',fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:3}}>Hauptthema</div>}
        <div style={{flex:1,fontSize:13}}>{optMap[v]||v}</div>
        <button type="button" disabled={i===0} onClick={()=>moveTo(i,i-1)} title="Höher" style={{border:'1px solid #D0D0D0',background:'var(--white)',borderRadius:3,width:26,height:24,fontSize:11,cursor:i===0?'not-allowed':'pointer',opacity:i===0?0.4:1}}>↑</button>
        <button type="button" disabled={i===arr.length-1} onClick={()=>moveTo(i,i+1)} title="Tiefer" style={{border:'1px solid #D0D0D0',background:'var(--white)',borderRadius:3,width:26,height:24,fontSize:11,cursor:i===arr.length-1?'not-allowed':'pointer',opacity:i===arr.length-1?0.4:1}}>↓</button>
        <button type="button" onClick={()=>removeAt(i)} title="Entfernen" style={{border:'1px solid #E0BEBE',background:'#FFF5F5',color:'var(--red)',borderRadius:3,width:26,height:24,fontSize:12,cursor:'pointer'}}>✕</button>
      </div>)}
    </div>}
    <div style={{fontSize:11,color:'#888',marginBottom:6}}>
      {full
        ? `Maximum ${max} Themen erreicht — Eintrag entfernen, um ein anderes hinzuzufügen.`
        : (arr.length===0?`Bitte 1–${max} Themen wählen. Reihenfolge zählt — erstes Thema = Hauptthema.`:`Weitere Themen hinzufügen (${arr.length}/${max}):`)
      }
    </div>
    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>

function JsonView({data}){
  const formatJson=(obj,indent=0)=>{
    const pad='  '.repeat(indent);
    if(obj===null)return <span className="json-bool">null</span>;
    if(typeof obj==='boolean')return <span className="json-bool">{obj.toString()}</span>;
    if(typeof obj==='number')return <span className="json-number">{obj}</span>;
    if(typeof obj==='string')return <span className="json-string">"{obj.length>80?obj.substring(0,80)+'…':obj}"</span>;
    if(Array.isArray(obj)){
      if(obj.length===0)return <span>[]</span>;
      return <span>{'[\n'}{obj.map((item,i)=><span key={i}>{pad}  {formatJson(item,indent+1)}{i<obj.length-1?',':''}{'\n'}</span>)}{pad}]</span>;
    }
    const keys=Object.keys(obj);
    if(keys.length===0)return <span>{'{}'}</span>;
    return <span>{'{\n'}{keys.map((k,i)=><span key={k}>{pad}  <span className="json-key">"{k}"</span>: {formatJson(obj[k],indent+1)}{i<keys.length-1?',':''}{'\n'}</span>)}{pad}{'}'}</span>;
  };
  return <pre className="json-preview">{formatJson(data)}</pre>;
}

// ===================== v0.14.7: DRIVE-LINK-EMBED-HELPER =====================
// Drive's `uc?id=ID`-Endpoint liefert beim Hotlinking (Cross-Origin <img src>) inzwischen HTML
// statt JPEG-Bytes zurück → Chrome blockiert via ERR_BLOCKED_BY_ORB. Der `thumbnail`-Endpoint ist
// für Embed-Vorschauen vorgesehen, liefert echte Bild-Bytes und akzeptiert eine Größe (sz=wXXXX).
// Backend (WF1 v2.7.1+) liefert ab jetzt direkt `thumbnail?id=ID&sz=w1200`. Diese Funktion ist die
// defensive Brücke für Alt-Einträge im Sheet, die noch das `uc?id=`-Format haben.
const DRIVE_UC_RE=/^https:\/\/drive\.google\.com\/uc\?id=([a-zA-Z0-9_-]+)/;
function toEmbedUrl(url){
  if(!url||typeof url!=='string') return url;
  const m=url.match(DRIVE_UC_RE);
  if(m) return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w1200';
  return url;
}

// ===================== v0.14.5: PROFILFOTO-UPLOADER =====================
// Drag-&-Drop + File-Picker, max N Fotos. Index 0 = Hauptfoto. Reihenfolge per ↑/↓.
// Props: value (string[]), onChange ((string[])=>void), uploadFn ((blob,filename)=>Promise<url>), max=3, disabled=false.
// Datenmodell unverändert: profilfoto_urls bleibt string[] (Drive-Links + ggf. Alt-URLs).
function ProfilfotoUploader({value=[],onChange,uploadFn,max=3,disabled=false}){
  const[uploading,setUploading]=useState(0);
  const[err,setErr]=useState('');
  const[dragOver,setDragOver]=useState(false);
  const fileInputRef=React.useRef(null);

  const urls=Array.isArray(value)?value:[];
  const remaining=Math.max(0,max-urls.length);
  const full=remaining===0;

  const handleFiles=useCallback(async(fileList)=>{
    if(disabled) return;
    setErr('');
    const files=Array.from(fileList||[]).slice(0,remaining);
    if(files.length===0) return;
    setUploading(u=>u+files.length);
    let next=urls.slice();
    const errors=[];
    for(const f of files){
      try{
        const{blob,filename}=await processProfilfoto(f);
        const url=await uploadFn(blob,filename);
        next=[...next,url];
        onChange(next.slice(0,max)); // nach jedem Upload speichern, damit Teilerfolge erhalten bleiben
      }catch(e){
        errors.push((f.name||'Datei')+': '+(e.message||String(e)));
      }finally{
        setUploading(u=>Math.max(0,u-1));
      }
    }
    if(errors.length) setErr(errors.join(' · '));
  },[urls,remaining,max,onChange,uploadFn,disabled]);

  const onDrop=(e)=>{
    e.preventDefault();e.stopPropagation();setDragOver(false);
    if(disabled||full) return;
    const files=e.dataTransfer?.files;
    if(files&&files.length) handleFiles(files);
  };
  const onDragOver=(e)=>{e.preventDefault();e.stopPropagation();if(!disabled&&!full)setDragOver(true);};
  const onDragLeave=(e)=>{e.preventDefault();e.stopPropagation();setDragOver(false);};

  const removeAt=(i)=>{const n=urls.slice();n.splice(i,1);onChange(n);};
  const moveTo=(from,to)=>{
    if(to<0||to>=urls.length) return;
    const n=urls.slice();
    const[item]=n.splice(from,1);
    n.splice(to,0,item);
    onChange(n);
  };

  const dropZoneStyle={
    border:'2px dashed '+(dragOver?'var(--coral)':'var(--sage)'),
    borderRadius:8,
    padding:'16px 20px',
    textAlign:'center',
    background:dragOver?'#FFF4EE':'var(--beige-light)',
    cursor:(disabled||full)?'not-allowed':'pointer',
    opacity:(disabled||full)?0.55:1,
    transition:'all 0.15s'
  };

  return <div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(140px, 1fr))',gap:10,marginBottom:10}}>
      {urls.map((u,i)=><div key={i} style={{position:'relative',background:'var(--white)',border:'1px solid #D0D0D0',borderRadius:6,overflow:'hidden'}}>
        <div style={{paddingTop:'100%',position:'relative',background:'#EEE'}}>
          <img src={toEmbedUrl(u)} alt={'Profilfoto '+(i+1)} style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',objectFit:'cover'}} onError={e=>{e.target.style.opacity=0.3;}}/>
          {i===0&&<div style={{position:'absolute',top:6,left:6,background:'var(--coral)',color:'#fff',fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:3}}>Hauptfoto</div>}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 6px',gap:4}}>
          <div style={{display:'flex',gap:2}}>
            <button type="button" disabled={disabled||i===0} onClick={()=>moveTo(i,i-1)} title="Nach links / oben" style={{border:'1px solid #D0D0D0',background:'var(--white)',borderRadius:3,width:24,height:22,fontSize:11,cursor:(disabled||i===0)?'not-allowed':'pointer',opacity:(disabled||i===0)?0.4:1}}>↑</button>
            <button type="button" disabled={disabled||i===urls.length-1} onClick={()=>moveTo(i,i+1)} title="Nach rechts / unten" style={{border:'1px solid #D0D0D0',background:'var(--white)',borderRadius:3,width:24,height:22,fontSize:11,cursor:(disabled||i===urls.length-1)?'not-allowed':'pointer',opacity:(disabled||i===urls.length-1)?0.4:1}}>↓</button>
          </div>
          <button type="button" disabled={disabled} onClick={()=>removeAt(i)} title="Entfernen" style={{border:'1px solid #E0BEBE',background:'#FFF5F5',color:'var(--red)',borderRadius:3,width:24,height:22,fontSize:12,cursor:disabled?'not-allowed':'pointer'}}>✕</button>
        </div>
      </div>)}
      {Array.from({length:uploading}).map((_,i)=><div key={'up-'+i} style={{aspectRatio:'1/1',background:'var(--beige-light)',border:'1px dashed var(--sage)',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'var(--sage-dark)'}}>
        <span className="spin" style={{marginRight:6}}>⏳</span>lädt hoch…
      </div>)}
    </div>
    <div
      onClick={()=>{if(!disabled&&!full) fileInputRef.current?.click();}}
      onDrop={onDrop} onDragOver={onDragOver} onDragLeave={onDragLeave}
      style={dropZoneStyle}
    >
      <div style={{fontSize:24,marginBottom:4}}>📷</div>
      <div style={{fontSize:13,fontWeight:600,color:'var(--anthrazit)'}}>
        {full?`Maximum ${max} Fotos erreicht`:'Foto auswählen oder hierhin ziehen'}
      </div>
      <div style={{fontSize:11,color:'#888',marginTop:4}}>
        {full
          ? 'Bestehendes Foto entfernen, um ein neues hinzuzufügen.'
          : `JPG, PNG, WEBP oder HEIC · ${urls.length}/${max} Fotos · Bilder werden auf max. 1200 px skaliert`}
      </div>
      <input
        ref={fileInputRef}
        type="file"
        accept="image/jpeg,image/png,image/webp,image/heic,image/heif,.heic,.heif"
        multiple
        style={{display:'none'}}
        onChange={e=>{handleFiles(e.target.files);e.target.value='';}}
      />
    </div>
    {err&&<div style={{marginTop:8,padding:'8px 12px',background:'#FFEBEB',border:'1px solid #E0BEBE',borderRadius:6,fontSize:12,color:'var(--red)'}}>
      <strong>Upload-Fehler:</strong> {err}
    </div>}
  </div>;
}

// ===================== AUTH / SESSION =====================
const SESSION_KEY='ww_session';
const SESSION_HOURS=8;
const ROLE_LABELS={admin:'Admin',curator_master:'Master',curator:'Kurator'};
const ROLE_COLORS={admin:'var(--coral)',curator_master:'var(--sage)',curator:'#888'};
// Status-Maschine (analog adamare): entwurf → übergeben → in_generierung → veröffentlicht, plus fehler.
// 'draft' wird als Alias für 'entwurf' geführt (Backend-Erbe aus adamare-Pipeline).
const STATUS_LABELS={entwurf:'Entwurf',draft:'Entwurf','übergeben':'Übergeben',in_generierung:'In Generierung','veröffentlicht':'Veröffentlicht',fehler:'Fehler'};
const STATUS_COLORS={entwurf:'#888',draft:'#888','übergeben':'#E07A5F',in_generierung:'#3498DB','veröffentlicht':'#4CAF50',fehler:'#D32F2F'};
const isEditableStatus=(s)=>!s||s==='entwurf'||s==='draft';

async function sha256(text){
  const enc=new TextEncoder();
  const data=enc.encode(text);
  const hash=await crypto.subtle.digest('SHA-256',data);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function loadSession(){
  try{
    const raw=localStorage.getItem(SESSION_KEY);
    if(!raw) return null;
    const data=JSON.parse(raw);
    const maxAge=SESSION_HOURS*60*60*1000;
    if(Date.now()-data.loginTime>maxAge){
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    return data.user;
  }catch{
    try{localStorage.removeItem(SESSION_KEY);}catch{}
    return null;
  }
}

function saveSession(user){
  try{localStorage.setItem(SESSION_KEY,JSON.stringify({user,loginTime:Date.now()}));}catch{}
}

function clearSession(){
  try{localStorage.removeItem(SESSION_KEY);}catch{}
}

// LoginScreen — bewusst als Top-Level-Komponente (nicht innerhalb App), damit
// React sie nicht bei jedem App-Render neu mountet.
function LoginScreen({apiBase,authHeaderName,authHeaderValue,onAuthHeaderValueChange,onLogin}){
  const[email,setEmail]=useState('');
  const[password,setPassword]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  // Lokaler Eingabewert für den API-Key. Wird beim Submit in den App-State persistiert,
  // damit nachgelagerte Endpoints (save-draft, hotel-search etc.) ihn ebenfalls senden.
  const[apiKey,setApiKey]=useState(authHeaderValue||'');
  const needsApiKey=!authHeaderValue;
  useEffect(()=>{setApiKey(authHeaderValue||'');},[authHeaderValue]);

  const submit=async()=>{
    if(!email||!password){setErr('Bitte E-Mail und Passwort eingeben.');return;}
    if(needsApiKey&&!apiKey.trim()){setErr('Bitte API-Schlüssel eingeben (einmalig pro Gerät/Browser).');return;}
    setErr('');setLoading(true);
    try{
      const effectiveApiKey=apiKey.trim()||authHeaderValue;
      // Persistiere API-Key sofort, damit auch alle weiteren Endpoints ihn benutzen
      if(effectiveApiKey&&effectiveApiKey!==authHeaderValue&&onAuthHeaderValueChange){
        onAuthHeaderValueChange(effectiveApiKey);
      }
      const passwordHash=await sha256(password);
      const headers={'Content-Type':'application/json'};
      // Webhook-Auth-Header (X-API-Key) muss auch beim Login mitgesendet werden,
      // weil der Login-Webhook in WF1 mit headerAuth abgesichert ist.
      if(authHeaderName&&effectiveApiKey) headers[authHeaderName]=effectiveApiKey;
      const res=await fetch(apiBase+'/login',{method:'POST',headers,body:JSON.stringify({email:email.trim(),passwordHash})});
      const txt=await res.text();
      let data;try{data=JSON.parse(txt);}catch{data=null;}
      // v0.14.4: User-freundliche Fehlerübersetzung. Backend liefert in manchen Fällen Plain-Text
      // statt JSON (z. B. "Authorization data is wrong!" beim ungültigen API-Schlüssel) — dieser
      // technische Text war für Friendly-Tester verwirrend. Hier mappen wir typische Fälle auf
      // verständliche Meldungen und behalten die technischen Details als kleines Sub-Detail.
      if(data&&data.success){
        saveSession(data.user);
        onLogin(data.user);
      }else if(data&&data.error){
        // Backend liefert strukturierte Fehlermeldung — direkt anzeigen.
        setErr(data.error);
      }else{
        // Plain-Text-Antwort oder kein JSON. Anhand HTTP-Status und Inhalt mappen.
        const raw=(txt||'').trim();
        let friendly='';
        if(res.status===401||/auth/i.test(raw)){
          friendly=needsApiKey
            ?'Anmeldung fehlgeschlagen. Bitte E-Mail, Passwort und API-Schlüssel prüfen.'
            :'E-Mail oder Passwort ist falsch.';
        }else if(res.status===403){
          friendly='Zugriff verweigert. Bitte mit Whispered-Ways-Support in Kontakt setzen.';
        }else if(res.status===404){
          friendly='Anmelde-Endpunkt nicht erreichbar. Bitte später erneut versuchen.';
        }else if(res.status>=500){
          friendly='Server nicht erreichbar. Bitte in ein paar Minuten erneut versuchen.';
        }else{
          friendly='Anmeldung fehlgeschlagen. Bitte Eingaben prüfen und erneut versuchen.';
        }
        // Technische Details als zweite Zeile, wenn vorhanden — hilft Steffen beim Debuggen,
        // ohne den Friendly-Tester zu verwirren.
        const detail=raw?raw.substring(0,120):`HTTP ${res.status}`;
        setErr(friendly+'\n\n[Technisch: '+detail+']');
      }
    }catch(e){
      setErr('Verbindungsfehler. Bitte Internetverbindung prüfen und erneut versuchen.');
      console.error('Login error:',e);
    }finally{
      setLoading(false);
    }
  };

  const inputStyle={width:'100%',padding:'12px 14px',marginBottom:12,border:'1px solid #D0D0D0',borderRadius:8,fontSize:14,boxSizing:'border-box',outline:'none',fontFamily:'inherit',color:'var(--anthrazit)'};

  return <div style={{minHeight:'100vh',background:'linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:20,fontFamily:'Calibri,Segoe UI,sans-serif'}}>
    <div style={{background:'var(--white)',borderRadius:12,padding:'48px 40px',boxShadow:'0 20px 60px rgba(0,0,0,0.3)',maxWidth:420,width:'100%',textAlign:'center'}}>
      <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:26,color:'var(--sage)',fontWeight:700,marginBottom:6,letterSpacing:1}}>WHISPERED WAYS</div>
      <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:16,color:'var(--coral)',marginBottom:8}}>Whisperer-Anmeldung</div>
      <div style={{fontSize:12,color:'#888',marginBottom:24}}>Bitte mit Zugangsdaten anmelden</div>

      {err&&<div style={{background:'#fee',color:'var(--red)',padding:'10px 14px',borderRadius:6,marginBottom:16,fontSize:13,textAlign:'left',whiteSpace:'pre-line',lineHeight:1.5}}>{err}</div>}

      <input type="email" placeholder="E-Mail-Adresse" value={email} onChange={e=>setEmail(e.target.value)} style={inputStyle} autoComplete="email" autoFocus
        onKeyDown={e=>{if(e.key==='Enter') document.getElementById('ww-login-pw')?.focus();}}/>

      <input id="ww-login-pw" type="password" placeholder="Passwort" value={password} onChange={e=>setPassword(e.target.value)} style={{...inputStyle,marginBottom:needsApiKey?12:24}} autoComplete="current-password"
        onKeyDown={e=>{if(e.key==='Enter') needsApiKey?document.getElementById('ww-login-apikey')?.focus():submit();}}/>

      {needsApiKey&&<>
        <input id="ww-login-apikey" type="password" placeholder="z. B. Bearer 75db804c..." value={apiKey} onChange={e=>setApiKey(e.target.value)} style={{...inputStyle,marginBottom:6}}
          onKeyDown={e=>{if(e.key==='Enter') submit();}}/>
        <div style={{fontSize:11,color:'#888',marginBottom:18,textAlign:'left',lineHeight:1.4}}>
          {authHeaderName}-Header (z. B. <code>Bearer &lt;token&gt;</code>). Einmalig pro Gerät/Browser nötig. Wird lokal gespeichert.
        </div>
      </>}

      <button onClick={submit} disabled={loading} style={{width:'100%',padding:12,background:loading?'#aaa':'var(--sage)',color:'var(--white)',border:'none',borderRadius:8,fontSize:15,cursor:loading?'wait':'pointer',fontWeight:600,fontFamily:'inherit',transition:'background 0.2s'}}>
        {loading?'Wird geprüft…':'Anmelden'}
      </button>

      <div style={{marginTop:20,fontSize:11,color:'#aaa'}}>API: {apiBase}</div>
    </div>
  </div>;
}

  //   Tab 'whisperer' (Tab 1) → wIdent offen, wPublic/wRegion/wStil/wBegl zu

  const toggleSection=(k)=>setOpenSections(p=>({...p,[k]:!p[k]}));
  const[showJson,setShowJson]=useState(false);
  const[saveStatus,setSaveStatus]=useState(null);
  const[saveMsg,setSaveMsg]=useState('');
  // === v0.12: Status-Maschine + Übergabe-Workflow ===
  const[tripStatus,setTripStatus]=useState('entwurf');
  const[rejectComment,setRejectComment]=useState('');
  const[transferStatus,setTransferStatus]=useState(null);
  const[transferMsg,setTransferMsg]=useState('');
  // === v0.12: Lade-Modal (Liste eigener / aller Reisen) ===
  const[showLoadModal,setShowLoadModal]=useState(false);
  const[loadList,setLoadList]=useState([]);
  const[loadListLoading,setLoadListLoading]=useState(false);
  const[loadListError,setLoadListError]=useState('');
  // === v0.13: Stufe 2 — Reject, Delete, Filter, Deep-Link-Fix ===
  const[showRejectModal,setShowRejectModal]=useState(false);
  const[rejectInput,setRejectInput]=useState('');
  const[rejectStatus,setRejectStatus]=useState(null);
  const[rejectMsg,setRejectMsg]=useState('');
  const[loadFilter,setLoadFilter]=useState('alle');
  const[deletingId,setDeletingId]=useState('');

  // Bootstrap
  const[taxonomien,setTaxonomien]=useState({});
  const[tagesartenList,setTagesartenList]=useState([]);
  const[vocEmotional,setVocEmotional]=useState(null); // Reiseprofil-Vokabulare aus /taxonomien-emotional; null -> FALLBACK_VOC
  const[bootstrap,setBootstrap]=useState({status:'pending',error:''});

  // TRIP STATE
  // v0.13: Bug-Fix — wenn ?entwurf_id=… in der URL ist, beginnen wir mit leerer entwurfId.
  // Hydrate setzt sie nach erfolgreichem load-draft. Bei Failure (Backend sagt 'Kein Zugriff'
  // oder 'nicht gefunden') bleibt sie leer → Save/Übergeben sind blockiert, Banner zeigt Hinweis.
  const[entwurfId,setEntwurfId]=useState(()=>{
    try{
      const p=new URLSearchParams(window.location.search);
      return p.get('entwurf_id')?'':genId();
    }catch{return genId();}
  });
  const[trip,setTrip]=useState({
    reise_ort:'', anzahl_tage:'', destination:'',
    region_sub:'', region_land:'',
    reise_format:'', reise_thema:[], reise_charakter:'',
    zielgruppe:[], tier:['pdf'], aktivitaets_level:'',
    mietwagen:'', mietwagen_details:'', flughafen_empfehlung:'',
    freitext_gesamtreise:'', persoenliche_erfahrung:'', magic_moment:'', sicherheitshinweise:'',
    trust_signale:[], empfohlene_monate:{},
    match: {pre_curation:3, pace:3, solitude_social:3, comfort:3, cultural_depth:3, activity_mode:3, authenticity:3},
    hotels: [{ref:'A', hotel_id:'', name:'', kategorie:'', adresse:'', telefon:'', tipps:'', naechte:'', wp_url:''}],
    donts:'', anreise:[],
    // === v0.15: Emotionale Taxonomie ===
    // Klasse A — Whisperer-Pflicht (manuelle UI-Eingabe, geht 1:1 ins Sheet als Einzelspalten)
    emo_tonalitaet:3,                  // Slider 1–5
    emo_international:false,           // Checkbox
    emo_persoenlichkeitsfit:[],        // Multi-Select max 3 (Slugs)
    // Klasse B + C — gemeinsames JSON-Feld (siehe Spec §6.1)
    // '' = nie analysiert | '{}' = analysiert, aber leer | gefüllt = Werte
    emotional_tags_json:'',
    analyse_emotional_at:''
  });
  const setT=(key,val)=>setTrip(p=>({...p,[key]:val}));
  const setMatch=(key,val)=>setTrip(p=>({...p,match:{...p.match,[key]:val}}));

  // WHISPERER STATE
  const[whisperer,setWhisperer]=useState({
    whisperer_id:'', status:'entwurf',
    vorname:'', nachname:'', email:'', geburtsdatum:'', nationalitaet:'', wohnsitz:'',
    profilfoto_urls:[], kurz_bio:'', beruf:'', familienstand:'',
    sprachen:[{sprache:'Deutsch',niveau:'Muttersprache'}],
    social_media:'',
    regionen:[], insider_tiefe:{},
    pre_curation:3, programm_dichte:3, komfort_bandbreite:[],
    begleitung_aktiv:false,
    begl_verfuegbarkeit:{}, begl_energie_stil:3, begl_vermittlungsstil:3, begl_ton:3,
    begl_geschlecht:'', begl_vorab_gespraech:false
  });
  const setW=(key,val)=>setWhisperer(p=>({...p,[key]:val}));
  const[whispererStatus,setWhispererStatus]=useState(null);
  const[whispererMsg,setWhispererMsg]=useState('');

  // ============== v0.15: EMOTIONALE ANALYSE-WORKFLOW ==============
  // Status der Analyse: 'idle' | 'loading' | 'done' | 'error'
  // Vor Backend-Fertigstellung läuft die Funktion im MOCK-Modus (EMOTIONAL_ANALYSE_MOCK=true).
  // Sobald der Endpoint /webhook/reise-api/analyse-emotional bereitsteht, MOCK auf false setzen.
  const EMOTIONAL_ANALYSE_MOCK=true;
  const[analyseStatus,setAnalyseStatus]=useState('idle');
  const[analyseMsg,setAnalyseMsg]=useState('');
  const[showAnalyseConfirm,setShowAnalyseConfirm]=useState(false);
  // Pendet eine Übergabe nach erfolgter Analyse? Nutzt der Confirm-Dialog vor /transfer.
  const[pendingTransferAfterAnalyse,setPendingTransferAfterAnalyse]=useState(false);

  // Vokabulare für emotionale Taxonomie ("Reiseprofil").
  // Quelle zur Laufzeit: GET /taxonomien-emotional (WF1, gespiegeltes /taxonomien-Muster).
  // FALLBACK_VOC greift, solange der Endpoint fehlt oder fehlschlägt
  // (identisch zur bisherigen Hartkodierung, Quelle: Spec §7).
  const FALLBACK_VOC={
    persoenlichkeitsfit:[
      {value:'high-performer',label:'für High Performer'},
      {value:'sensible-menschen',label:'für sensible Menschen'},
      {value:'im-umbruch',label:'für Menschen im Umbruch'},
      {value:'kreative',label:'für Kreative'},
      {value:'alleinreisende',label:'für Alleinreisende'},
      {value:'naturverbundene',label:'für naturverbundene Menschen'},
      {value:'suchende',label:'für Suchende'},
      {value:'genießer',label:'für Genießer'}
    ],
    emotionale_wirkung:[
      {value:'regenerierend',label:'regenerierend'},
      {value:'aktivierend',label:'aktivierend'},
      {value:'transformativ',label:'transformativ'},
      {value:'verbindend',label:'verbindend'}
    ],
    mentale_wirkung:[
      {value:'klärend',label:'klärend'},
      {value:'inspirierend',label:'inspirierend'},
      {value:'reflexiv',label:'reflexiv'}
    ],
    archetyp:[
      {value:'neustart',label:'Neustart'},
      {value:'rueckverbindung',label:'Rückverbindung mit sich selbst'},
      {value:'flucht-ueberforderung',label:'Flucht aus Überforderung'},
      {value:'suche-lebendigkeit',label:'Suche nach Lebendigkeit'}
    ],
    tonalitaet_skala:['Tiefgründig','Eher persönlich','Mix','Eher locker','Humorvoll-leicht']
  };
  // Laufzeit-Vokabulare: aus /taxonomien-emotional, sonst Fallback.
  const VOC_PERSOENLICHKEITSFIT=(vocEmotional&&vocEmotional.persoenlichkeitsfit)||FALLBACK_VOC.persoenlichkeitsfit;
  const VOC_EMOTIONALE_WIRKUNG=(vocEmotional&&vocEmotional.emotionale_wirkung)||FALLBACK_VOC.emotionale_wirkung;
  const VOC_MENTALE_WIRKUNG=(vocEmotional&&vocEmotional.mentale_wirkung)||FALLBACK_VOC.mentale_wirkung;
  const VOC_ARCHETYP=(vocEmotional&&vocEmotional.archetyp)||FALLBACK_VOC.archetyp;
  const TONALITAET_LABELS=(vocEmotional&&vocEmotional.tonalitaet_skala)||FALLBACK_VOC.tonalitaet_skala;

  // Helper: parse emotional_tags_json sicher
  const parseEmotionalTags=()=>{
    try{
      if(!trip.emotional_tags_json) return {};
      return typeof trip.emotional_tags_json==='string'
        ? JSON.parse(trip.emotional_tags_json)
        : trip.emotional_tags_json;
    }catch{return {};}
  };
  const emotionalTags=parseEmotionalTags();
  const isAnalysed=trip.emotional_tags_json&&trip.emotional_tags_json!=='';

  // Setter für einzelne Klasse-C-Felder (nach Analyse vom Whisperer editierbar)
  const setEmotionalField=(key,val)=>{
    const cur=parseEmotionalTags();
    const next={...cur,[key]:val};
    setT('emotional_tags_json',JSON.stringify(next));
  };

  // === Klasse-B-Mapping (deterministisch, im Backend dieselbe Logik) ===
  // Frontend-Spiegel zur Vorschau — endgültige Werte kommen aus dem Analyse-WF.
  const computeClassBMock=()=>{
    const m=trip.match||{};
    // Energieprofil aus pace + activity_mode
    const score=(m.pace||3)+(m.activity_mode||3);
    let energieprofil=['ausgewogen'];
    if(score<=4) energieprofil=['ruhig'];
    else if(score>=8) energieprofil=['intensiv'];
    // Komfortzone-erweiternd separat, wenn beide hoch + cultural_depth hoch
    if((m.pace||3)>=4&&(m.cultural_depth||3)>=4) energieprofil.push('komfortzone-erweiternd');
    // Erlebnisstil
    const erlebnisstil=[];
    if((m.comfort||3)>=4) erlebnisstil.push('luxurioes');
    if(Array.isArray(trip.reise_thema)&&trip.reise_thema.includes('natur-landschaft')) erlebnisstil.push('naturnah');
    if((m.pre_curation||3)<=2) erlebnisstil.push('frei-spontan');
    if((m.comfort||3)<=2&&(m.pre_curation||3)<=2) erlebnisstil.push('minimalistisch');
    if(erlebnisstil.length===0) erlebnisstil.push('naturnah');
    // Körperliche Wirkung
    let koerperliche_wirkung=['aktiv'];
    if(trip.aktivitaets_level==='leicht') koerperliche_wirkung=['entspannend'];
    else if(trip.aktivitaets_level==='anspruchsvoll') koerperliche_wirkung=['sportlich'];
    else if((m.activity_mode||3)<=2) koerperliche_wirkung=['entspannend'];
    else if((m.activity_mode||3)>=4) koerperliche_wirkung=['sportlich'];
    return {energieprofil,erlebnisstil,koerperliche_wirkung};
  };

  // === Mock-LLM für Klasse C ===
  // Heuristik: Stichwortbasierte Extraktion aus den Whisperer-Freitexten.
  // Im echten Backend ersetzt durch LLM-Call (Anthropic Claude, JSON-Schema-erzwungen).
  const computeClassCMock=()=>{
    const text=[trip.persoenliche_erfahrung,trip.magic_moment,trip.freitext_gesamtreise,trip.sicherheitshinweise]
      .filter(Boolean).join(' ').toLowerCase();
    const tage_texte=(tage||[]).flatMap(t=>[t.tag_story||'',...(t.stopps||[]).map(s=>s.insider_tipps||''),...(t.aktivitaeten||[]).map(a=>a.insider_tipps||'')]).join(' ').toLowerCase();
    const all=text+' '+tage_texte;

    const emotionale_wirkung=[];
    if(/ruhe|entschleun|regenerier|erhol|natur|still|abschalt/.test(all)) emotionale_wirkung.push('regenerierend');
    if(/energie|lebendig|aktiv|aufbruch|tatendrang|wach/.test(all)) emotionale_wirkung.push('aktivierend');
    if(/transform|verändr|wandel|neu definieren|umbruch|reflex|klär|durchbruch/.test(all)) emotionale_wirkung.push('transformativ');
    if(/begegnung|gemeinschaft|verbind|austausch|herz|nähe|geselligkeit|tisch/.test(all)) emotionale_wirkung.push('verbindend');
    if(emotionale_wirkung.length===0) emotionale_wirkung.push('regenerierend');

    const mentale_wirkung=[];
    if(/klär|fokus|durchbruch|verstehen|orientierung/.test(all)) mentale_wirkung.push('klärend');
    if(/inspir|kreativ|impuls|idee|neu/.test(all)) mentale_wirkung.push('inspirierend');
    if(/reflex|nachdenk|kontemplat|innehalt|bewusst/.test(all)) mentale_wirkung.push('reflexiv');
    if(mentale_wirkung.length===0) mentale_wirkung.push('inspirierend');

    let archetyp='rueckverbindung';
    if(/burnout|überforderung|stress|erschöpf|raus aus|abstand|flucht/.test(all)) archetyp='flucht-ueberforderung';
    else if(/neuanfang|neustart|trennung|jobwechsel|abschluss/.test(all)) archetyp='neustart';
    else if(/abenteuer|grenze|lebendig|ekstase|adrenalin|herausford/.test(all)) archetyp='suche-lebendigkeit';

    return {
      emotionale_wirkung:emotionale_wirkung.slice(0,3),
      mentale_wirkung:mentale_wirkung.slice(0,2),
      archetyp
    };
  };

  // === Analyse ausführen ===
  // Bei MOCK: lokale Heuristik + 1.4 s Delay. Bei NICHT-MOCK: POST /analyse-emotional.
  const runEmotionalAnalysis=async(silent)=>{
    if(!entwurfId){
      if(!silent) alert('Kein Entwurf vorhanden — bitte zuerst speichern.');
      return false;
    }
    setAnalyseStatus('loading');
    setAnalyseMsg('Texte werden analysiert…');
    try{
      if(EMOTIONAL_ANALYSE_MOCK){
        await new Promise(r=>setTimeout(r,1400));
        const cls_b=computeClassBMock();
        const cls_c=computeClassCMock();
        const merged={...cls_b,...cls_c};
        setT('emotional_tags_json',JSON.stringify(merged));
        setT('analyse_emotional_at',new Date().toISOString());
        setAnalyseStatus('done');
        setAnalyseMsg('Analyse abgeschlossen (Mock).');
        setTimeout(()=>setAnalyseStatus(null),3000);
        return true;
      }else{
        // Echter Endpoint — sobald Backend bereit (Spec §5.1)
        const res=await apiCall('POST','/analyse-emotional',{entwurf_id:entwurfId});
        if(res&&res.ok&&res.emotional_tags){
          setT('emotional_tags_json',JSON.stringify(res.emotional_tags));
          setT('analyse_emotional_at',new Date().toISOString());
          setAnalyseStatus('done');
          setAnalyseMsg('Analyse abgeschlossen.');
          setTimeout(()=>setAnalyseStatus(null),3000);
          return true;
        }else{
          setAnalyseStatus('error');
          setAnalyseMsg('Analyse fehlgeschlagen: '+(res?.error||'unbekannt'));
          setTimeout(()=>setAnalyseStatus(null),6000);
          return false;
        }
      }
    }catch(err){
      setAnalyseStatus('error');
      setAnalyseMsg('Analyse-Fehler: '+err.message);
      setTimeout(()=>setAnalyseStatus(null),6000);
      return false;
    }
  };

  // TAGE STATE
  // v0.14.3: position-Feld pro Sub-Item (Stopp/Restaurant/Aktivität). Frontend sortiert die
  // drei Arrays gemeinsam nach position für eine gemischte Tagesablauf-Anzeige.
  // Backend bleibt unverändert: drei Arrays (stopps/restaurants/aktivitaeten), das position-Feld
  // wird einfach mit jedem Item mitgespeichert (additives Schema, keine Migration nötig).
  const[tage,setTage]=useState([
    {tag_nummer:1, tag_typ:'', tag_titel:'', tag_start:'', tag_story:'', hotel_ref:'A', zimmer_tipp:'',
     stopps:[{position:1,name:'',adresse:'',uhrzeit:'',dauer:'',besonderheit:'',insider_tipps:''}],
     restaurants:[{position:2,name:'',mahlzeit:'',charakter:'',preis:'',adresse:'',telefon:'',warum:''}],
     aktivitaeten:[{position:3,name:'',anbieter:'',adresse:'',telefon:'',insider_tipps:''}]
    }
  ]);
  // v0.14.3: Sub-Item-Open-State im Akkordeon-Modus — pro Tag ist immer max. ein Item offen.
  // Schema: openItem[tagIdx] = {type:'stopp'|'food'|'akt', idx:Number} | null/undefined
  const[openItem,setOpenItem]=useState({});

  // v0.14.2: Helper — prüft ob ein Sub-Item leer ist (kein Confirm-Dialog beim Löschen).
  const isItemEmpty=(item)=>!item||Object.values(item).every(v=>!v||(Array.isArray(v)&&v.length===0));

  // v0.14.2: Helper — fortlaufende Renumbering der tag_nummer nach Move/Delete.
  const renumberTage=(arr)=>arr.map((t,i)=>({...t,tag_nummer:i+1}));

  // v0.14.2: Helper — Sub-Item-Open-Map nach Swap (idxA <-> idxB) für einen Tag reorganisieren.
  // (v0.14.3: Diese Helper werden nicht mehr für die Sub-Item-Open-States gebraucht,
  //  weil openItem stattdessen einen einzigen aktiven Eintrag pro Tag trackt.
  //  Sie sind hier dennoch belassen, falls künftig benötigt.)
  const swapOpenInTag=(openMap,tagIdx,idxA,idxB)=>{
    const next={...openMap};
    const ka=`${tagIdx}-${idxA}`,kb=`${tagIdx}-${idxB}`;
    const va=next[ka],vb=next[kb];
    if(vb===undefined)delete next[ka];else next[ka]=vb;
    if(va===undefined)delete next[kb];else next[kb]=va;
    return next;
  };
  const shiftOpenAfterDelete=(openMap,tagIdx,deletedIdx)=>{
    const next={};
    Object.entries(openMap).forEach(([k,v])=>{
      const m=k.match(/^(\d+)-(\d+)$/);
      if(!m){next[k]=v;return;}
      const ti=parseInt(m[1]),si=parseInt(m[2]);
      if(ti!==tagIdx){next[k]=v;return;}
      if(si<deletedIdx){next[k]=v;return;}
      if(si===deletedIdx)return;
      next[`${tagIdx}-${si-1}`]=v;
    });
    return next;
  };

  // v0.14.3: Liefert höchste position über alle drei Sub-Listen eines Tages.
  const maxPosition=(tag)=>{
    if(!tag)return 0;
    const all=[...(tag.stopps||[]),...(tag.restaurants||[]),...(tag.aktivitaeten||[])];
    return all.reduce((m,it)=>Math.max(m,Number(it.position)||0),0);
  };

  // v0.14.3: Garantiert dass jedes Sub-Item eines Tages eine position hat. Bei Hydrate aus dem Backend
  // (alte Daten ohne position-Feld) werden Stopps zuerst, dann Food, dann Aktivitäten in heutiger
  // Reihenfolge nummeriert. Bestehende positions bleiben unverändert; nur fehlende werden ans Ende angehängt.
  const ensurePositions=(tag)=>{
    if(!tag)return tag;
    const taken=[...(tag.stopps||[]),...(tag.restaurants||[]),...(tag.aktivitaeten||[])]
      .map(it=>Number(it.position)||0).filter(n=>n>0);
    let nextPos=taken.length?Math.max(...taken):0;
    const fill=(arr)=>(arr||[]).map(it=>{
      if(Number(it.position)>0)return it;
      nextPos+=1;
      return {...it,position:nextPos};
    });
    return {...tag,stopps:fill(tag.stopps),restaurants:fill(tag.restaurants),aktivitaeten:fill(tag.aktivitaeten)};
  };

  // v0.14.3: Renumbering aller Sub-Items eines Tages nach Move/Delete — fortlaufend 1..N
  // entlang der bestehenden Sortierung (sortByPosition). Hält die Werte sauber und vermeidet
  // langfristig wachsende Lücken oder Kollisionen.
  const renumberSchedule=(tag)=>{
    if(!tag)return tag;
    const items=[
      ...(tag.stopps||[]).map((it,i)=>({type:'stopp',idx:i,it})),
      ...(tag.restaurants||[]).map((it,i)=>({type:'food',idx:i,it})),
      ...(tag.aktivitaeten||[]).map((it,i)=>({type:'akt',idx:i,it}))
    ].sort((a,b)=>(Number(a.it.position)||0)-(Number(b.it.position)||0));
    const newStopps=[...(tag.stopps||[])];
    const newRests=[...(tag.restaurants||[])];
    const newAkts=[...(tag.aktivitaeten||[])];
    items.forEach((m,i)=>{
      const pos=i+1;
      if(m.type==='stopp')newStopps[m.idx]={...m.it,position:pos};
      else if(m.type==='food')newRests[m.idx]={...m.it,position:pos};
      else newAkts[m.idx]={...m.it,position:pos};
    });
    return {...tag,stopps:newStopps,restaurants:newRests,aktivitaeten:newAkts};
  };

  // v0.14.3: Liefert die kombinierte, nach position sortierte Liste eines Tages.
  // Format pro Eintrag: {type:'stopp'|'food'|'akt', idx:OriginalIndexImArray, item:Object, position:Number}.
  const getSortedSchedule=(tag)=>{
    if(!tag)return [];
    return [
      ...(tag.stopps||[]).map((it,i)=>({type:'stopp',idx:i,item:it,position:Number(it.position)||0})),
      ...(tag.restaurants||[]).map((it,i)=>({type:'food',idx:i,item:it,position:Number(it.position)||0})),
      ...(tag.aktivitaeten||[]).map((it,i)=>({type:'akt',idx:i,item:it,position:Number(it.position)||0}))
    ].sort((a,b)=>a.position-b.position);
  };

  // === TAG ===
  const updateTag=(idx,key,val)=>setTage(p=>{const n=[...p];n[idx]={...n[idx],[key]:val};return n;});
  const addTag=()=>{
    const newTag={tag_nummer:tage.length+1,tag_typ:'',tag_titel:'',tag_start:'',tag_story:'',hotel_ref:'A',zimmer_tipp:'',
      stopps:[{position:1,name:'',adresse:'',uhrzeit:'',dauer:'',besonderheit:'',insider_tipps:''}],
      restaurants:[{position:2,name:'',mahlzeit:'',charakter:'',preis:'',adresse:'',telefon:'',warum:''}],
      aktivitaeten:[{position:3,name:'',anbieter:'',adresse:'',telefon:'',insider_tipps:''}]};
    setTage(p=>renumberTage([...p,newTag]));
    setOpenTags(o=>({...o,[tage.length]:true}));
  };
  const removeTag=(tagIdx)=>{
    const tag=tage[tagIdx];
    if(!tag)return;
    const hasContent=(tag.tag_titel||'').trim()||(tag.tag_story||'').trim()||(tag.tag_typ||'').trim()||
      (tag.stopps||[]).some(s=>!isItemEmpty(s))||(tag.restaurants||[]).some(r=>!isItemEmpty(r))||(tag.aktivitaeten||[]).some(a=>!isItemEmpty(a));
    if(hasContent&&!window.confirm(`Tag ${tag.tag_nummer} mit allen Stopps, Empfehlungen und Aktivitäten endgültig löschen?`))return;
    setTage(p=>renumberTage(p.filter((_,i)=>i!==tagIdx)));
    setOpenTags(o=>{const r={};Object.entries(o).forEach(([k,v])=>{const ki=parseInt(k);if(ki<tagIdx)r[k]=v;else if(ki>tagIdx)r[ki-1]=v;});return r;});
    // openItem nach Tag-Delete reorganisieren — alle tagIdx > deletedIdx verschieben sich.
    setOpenItem(o=>{
      const r={};Object.entries(o).forEach(([k,v])=>{const ki=parseInt(k);if(ki<tagIdx)r[k]=v;else if(ki>tagIdx)r[ki-1]=v;});return r;
    });
  };
  const moveTag=(tagIdx,dir)=>{
    const newIdx=tagIdx+dir;
    if(newIdx<0||newIdx>=tage.length)return;
    setTage(p=>{const next=[...p];[next[tagIdx],next[newIdx]]=[next[newIdx],next[tagIdx]];return renumberTage(next);});
    setOpenTags(o=>{
      const r={...o};const va=r[tagIdx],vb=r[newIdx];
      if(vb===undefined)delete r[tagIdx];else r[tagIdx]=vb;
      if(va===undefined)delete r[newIdx];else r[newIdx]=va;
      return r;
    });
    setOpenItem(o=>{
      const r={...o};const va=r[tagIdx],vb=r[newIdx];
      if(vb===undefined)delete r[tagIdx];else r[tagIdx]=vb;
      if(va===undefined)delete r[newIdx];else r[newIdx]=va;
      return r;
    });
  };

  // === SUB-ITEMS (Stopp / Food / Aktivität) ===
  // v0.14.3: Generische Toggle-Funktion — Akkordeon-Modus, max. ein Item offen pro Tag.
  // Klick auf bereits offenes Item: zuklappen. Klick auf anderes: dieses öffnen, alle anderen zu.
  const toggleItem=(tagIdx,type,idx)=>{
    setOpenItem(o=>{
      const cur=o[tagIdx];
      if(cur&&cur.type===type&&cur.idx===idx){
        const r={...o};delete r[tagIdx];return r;
      }
      return {...o,[tagIdx]:{type,idx}};
    });
  };

  // STOPP
  const updateStopp=(tagIdx,stoppIdx,key,val)=>setTage(p=>{const n=[...p];const s=[...n[tagIdx].stopps];s[stoppIdx]={...s[stoppIdx],[key]:val};n[tagIdx]={...n[tagIdx],stopps:s};return n;});
  const addStopp=(tagIdx)=>{
    const newIdx=(tage[tagIdx]?.stopps?.length)||0;
    const pos=maxPosition(tage[tagIdx])+1;
    setTage(p=>{const n=[...p];n[tagIdx]={...n[tagIdx],stopps:[...n[tagIdx].stopps,{position:pos,name:'',adresse:'',uhrzeit:'',dauer:'',besonderheit:'',insider_tipps:''}]};return n;});
    setOpenItem(o=>({...o,[tagIdx]:{type:'stopp',idx:newIdx}}));
  };
  const removeStopp=(tagIdx,stoppIdx)=>{
    const item=tage[tagIdx]?.stopps?.[stoppIdx];
    if(!isItemEmpty(item)&&!window.confirm('Stopp wirklich löschen?'))return;
    setTage(p=>{const n=[...p];n[tagIdx]={...n[tagIdx],stopps:n[tagIdx].stopps.filter((_,i)=>i!==stoppIdx)};n[tagIdx]=renumberSchedule(n[tagIdx]);return n;});
    setOpenItem(o=>{
      const cur=o[tagIdx];if(!cur)return o;
      if(cur.type==='stopp'&&cur.idx===stoppIdx){const r={...o};delete r[tagIdx];return r;}
      if(cur.type==='stopp'&&cur.idx>stoppIdx)return {...o,[tagIdx]:{type:'stopp',idx:cur.idx-1}};
      return o;
    });
  };

  // FOOD/DRINK (Backend-Feld bleibt 'restaurants')
  const updateRest=(tagIdx,rIdx,key,val)=>setTage(p=>{const n=[...p];const r=[...n[tagIdx].restaurants];r[rIdx]={...r[rIdx],[key]:val};n[tagIdx]={...n[tagIdx],restaurants:r};return n;});
  const addRest=(tagIdx)=>{
    const newIdx=(tage[tagIdx]?.restaurants?.length)||0;
    const pos=maxPosition(tage[tagIdx])+1;
    setTage(p=>{const n=[...p];n[tagIdx]={...n[tagIdx],restaurants:[...n[tagIdx].restaurants,{position:pos,name:'',mahlzeit:'',charakter:'',preis:'',adresse:'',telefon:'',warum:''}]};return n;});
    setOpenItem(o=>({...o,[tagIdx]:{type:'food',idx:newIdx}}));
  };
  const removeRest=(tagIdx,rIdx)=>{
    const item=tage[tagIdx]?.restaurants?.[rIdx];
    if(!isItemEmpty(item)&&!window.confirm('Eintrag (Food & Drinks) wirklich löschen?'))return;
    setTage(p=>{const n=[...p];n[tagIdx]={...n[tagIdx],restaurants:n[tagIdx].restaurants.filter((_,i)=>i!==rIdx)};n[tagIdx]=renumberSchedule(n[tagIdx]);return n;});
    setOpenItem(o=>{
      const cur=o[tagIdx];if(!cur)return o;
      if(cur.type==='food'&&cur.idx===rIdx){const r={...o};delete r[tagIdx];return r;}
      if(cur.type==='food'&&cur.idx>rIdx)return {...o,[tagIdx]:{type:'food',idx:cur.idx-1}};
      return o;
    });
  };

  // AKTIVITÄT
  const updateAkt=(tagIdx,aIdx,key,val)=>setTage(p=>{const n=[...p];const a=[...n[tagIdx].aktivitaeten];a[aIdx]={...a[aIdx],[key]:val};n[tagIdx]={...n[tagIdx],aktivitaeten:a};return n;});
  const addAkt=(tagIdx)=>{
    const newIdx=(tage[tagIdx]?.aktivitaeten?.length)||0;
    const pos=maxPosition(tage[tagIdx])+1;
    setTage(p=>{const n=[...p];n[tagIdx]={...n[tagIdx],aktivitaeten:[...n[tagIdx].aktivitaeten,{position:pos,name:'',anbieter:'',adresse:'',telefon:'',insider_tipps:''}]};return n;});
    setOpenItem(o=>({...o,[tagIdx]:{type:'akt',idx:newIdx}}));
  };
  const removeAkt=(tagIdx,aIdx)=>{
    const item=tage[tagIdx]?.aktivitaeten?.[aIdx];
    if(!isItemEmpty(item)&&!window.confirm('Aktivität wirklich löschen?'))return;
    setTage(p=>{const n=[...p];n[tagIdx]={...n[tagIdx],aktivitaeten:n[tagIdx].aktivitaeten.filter((_,i)=>i!==aIdx)};n[tagIdx]=renumberSchedule(n[tagIdx]);return n;});
    setOpenItem(o=>{
      const cur=o[tagIdx];if(!cur)return o;
      if(cur.type==='akt'&&cur.idx===aIdx){const r={...o};delete r[tagIdx];return r;}
      if(cur.type==='akt'&&cur.idx>aIdx)return {...o,[tagIdx]:{type:'akt',idx:cur.idx-1}};
      return o;
    });
  };

  // v0.14.3: Generischer Move-Helper — verschiebt ein Sub-Item innerhalb der gemischten,
  // nach position sortierten Tagesablauf-Liste um eine Position auf/ab. Tauscht position
  // mit dem Nachbarn (egal welcher Typ). Original-Indizes in stopps/restaurants/aktivitaeten
  // bleiben dabei unverändert — openItem braucht keine Korrektur.
  const moveItem=(tagIdx,type,idx,dir)=>{
    const tag=tage[tagIdx];
    if(!tag)return;
    const sched=getSortedSchedule(tag);
    const i=sched.findIndex(e=>e.type===type&&e.idx===idx);
    if(i<0)return;
    const j=i+dir;
    if(j<0||j>=sched.length)return;
    const a=sched[i],b=sched[j];
    const posA=Number(a.item.position)||0;
    const posB=Number(b.item.position)||0;
    setTage(p=>{
      const n=[...p];
      const t={...n[tagIdx]};
      const apply=(arr,arrIdx,newPos)=>{const x=[...arr];x[arrIdx]={...x[arrIdx],position:newPos};return x;};
      // a bekommt posB, b bekommt posA
      if(a.type==='stopp')t.stopps=apply(t.stopps,a.idx,posB);
      else if(a.type==='food')t.restaurants=apply(t.restaurants,a.idx,posB);
      else t.aktivitaeten=apply(t.aktivitaeten,a.idx,posB);
      if(b.type==='stopp')t.stopps=apply(t.stopps,b.idx,posA);
      else if(b.type==='food')t.restaurants=apply(t.restaurants,b.idx,posA);
      else t.aktivitaeten=apply(t.aktivitaeten,b.idx,posA);
      n[tagIdx]=t;
      return n;
    });
  };

  // HOTEL-SUCHE STATE
  const[hotelSearch,setHotelSearch]=useState({});
  const setHS=useCallback((hi,patch)=>setHotelSearch(p=>({...p,[hi]:{...(p[hi]||{}),...patch}})),[]);

  // ============== API HELPER ==============
  const apiCall=useCallback(async(method,path,body=null)=>{
    const headers={'Content-Type':'application/json'};
    if(authHeaderName&&authHeaderValue) headers[authHeaderName]=authHeaderValue;
    const res=await fetch(apiBase+path,{method,headers,body:body?JSON.stringify(body):undefined});
    const txt=await res.text();
    let data;
    try{data=JSON.parse(txt);}catch{data={error:'Antwort kein gültiges JSON: '+txt.substring(0,200)};}
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${data.error||txt.substring(0,150)}`);
    return data;
  },[apiBase,authHeaderName,authHeaderValue]);

  // v0.14.5: Profilfoto-Upload — POST /profilfoto-upload mit Blob als rawBody, Filename als Query-Param.
  // Antwortformat: {success, file_id, drive_link, name}. Wir adoptieren drive_link in profilfoto_urls.
  const uploadProfilfoto=useCallback(async(blob,filename)=>{
    const headers={'Content-Type':'image/jpeg'};
    if(authHeaderName&&authHeaderValue) headers[authHeaderName]=authHeaderValue;
    const url=apiBase+'/profilfoto-upload?filename='+encodeURIComponent(filename);
    const res=await fetch(url,{method:'POST',headers,body:blob});
    const txt=await res.text();
    let data;
    try{data=JSON.parse(txt);}catch{data={error:'Antwort kein gültiges JSON: '+txt.substring(0,200)};}
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${data.error||txt.substring(0,150)}`);
    if(!data.success||!data.drive_link) throw new Error('Upload ohne drive_link: '+(data.error||JSON.stringify(data).substring(0,150)));
    return data.drive_link;
  },[apiBase,authHeaderName,authHeaderValue]);

  // ============== HYDRATE FROM DRAFT ==============
  const hydrateFromDraft=useCallback((d)=>{
    setEntwurfId(d.entwurf_id);
    // v0.12: Status + Reject-Comment aus DB übernehmen. Backend liefert ggf. 'draft' (alt) → wir
    // halten den Wert 1:1 im State; STATUS_LABELS/STATUS_COLORS behandeln 'draft' als Alias für 'entwurf'.
    setTripStatus(d.status||'entwurf');
    setRejectComment(d.reject_comment||'');
    let params={};
    try{params=typeof d.params==='string'?JSON.parse(d.params):(d.params||{});}catch{}
    setTrip(p=>{
      const taxObj=safeJson(d.taxonomien,{});
      return {
        ...p,
        reise_ort:params.reise_ort||p.reise_ort,
        anzahl_tage:String(params.anzahl_tage||p.anzahl_tage||''),
        reise_format:d.reise_format||p.reise_format,
        reise_thema:safeJson(d.reise_thema,p.reise_thema),
        reise_charakter:d.reise_charakter||p.reise_charakter,
        tier:(()=>{const t=safeJson(d.tier,p.tier);return(Array.isArray(t)&&t.length===0)?['pdf']:t;})(),
        zielgruppe:safeJson(d.zielgruppe,p.zielgruppe),
        trust_signale:safeJson(d.trust_signale,p.trust_signale),
        empfohlene_monate:safeJson(d.empfohlene_monate_json,p.empfohlene_monate),
        match:safeJson(d.match_dimensions_json,p.match),
        mietwagen:d.mietwagen||p.mietwagen,
        mietwagen_details:d.mietwagen_details||p.mietwagen_details,
        flughafen_empfehlung:d.flughafen_empfehlung||p.flughafen_empfehlung,
        freitext_gesamtreise:d.freitext_gesamtreise||p.freitext_gesamtreise,
        persoenliche_erfahrung:d.persoenliche_erfahrung||p.persoenliche_erfahrung,
        magic_moment:d.magic_moment||p.magic_moment,
        sicherheitshinweise:d.sicherheitshinweise||p.sicherheitshinweise,
        aktivitaets_level:d.aktivitaets_level||p.aktivitaets_level,
        hotels:safeJson(d.hotels_pool_json,p.hotels),
        anreise:safeJson(d.anreise,p.anreise),
        region_sub:taxObj.region_subregion||p.region_sub,
        region_land:taxObj.region_land||p.region_land,
        // v0.15: Emotionale Taxonomie aus DB rehydrieren
        emo_tonalitaet:d.emo_tonalitaet!==undefined&&d.emo_tonalitaet!==''?Number(d.emo_tonalitaet):p.emo_tonalitaet,
        emo_international:d.emo_international===true||d.emo_international==='true'||d.emo_international===1||d.emo_international==='1',
        emo_persoenlichkeitsfit:safeJson(d.emo_persoenlichkeitsfit,p.emo_persoenlichkeitsfit),
        emotional_tags_json:d.emotional_tags_json||'',
        analyse_emotional_at:d.analyse_emotional_at||''
      };
    });
    if(Array.isArray(params.tage)&&params.tage.length){
      // v0.14.3: ensurePositions vergibt position-Werte für Sub-Items aus alten Reisen,
      // die noch ohne position-Feld gespeichert wurden. Reihenfolge: Stopps zuerst, dann
      // Food, dann Aktivitäten — entspricht der heutigen Anzeige-Reihenfolge.
      setTage(params.tage.map((t,i)=>ensurePositions({
        tag_nummer:t.tag_nummer||i+1,
        tag_typ:t.tag_typ||'',
        tag_titel:t.tag_ort||t.tag_titel||'',
        tag_start:t.tag_start||'',
        tag_story:t.tag_story||t.tag_beschreibung||'',
        hotel_ref:t.hotel_ref||'A',
        zimmer_tipp:t.zimmer_tipp||'',
        stopps:Array.isArray(t.stopps)&&t.stopps.length?t.stopps:[{name:'',adresse:'',uhrzeit:'',dauer:'',besonderheit:'',insider_tipps:''}],
        restaurants:Array.isArray(t.restaurants)&&t.restaurants.length?t.restaurants:[{name:'',mahlzeit:'',charakter:'',preis:'',adresse:'',telefon:'',warum:''}],
        aktivitaeten:Array.isArray(t.aktivitaeten)&&t.aktivitaeten.length?t.aktivitaeten:[{name:'',anbieter:'',adresse:'',telefon:'',insider_tipps:''}]
      })));
    }
    // Async wp_url-Refresh: für Hotels mit hotel_id aber leerem wp_url einmalig /hotel-single aufrufen.
    // Fire-and-forget — UI wird nachträglich aktualisiert, blockiert nicht den Hauptpfad.
    const hotelsRaw=safeJson(d.hotels_pool_json,[]);
    const toRefresh=(Array.isArray(hotelsRaw)?hotelsRaw:[]).filter(h=>h&&h.hotel_id&&!h.wp_url);
    if(toRefresh.length>0){
      (async()=>{
        const results=await Promise.all(toRefresh.map(h=>
          apiCall('GET',`/hotel-single?hotel_id=${encodeURIComponent(h.hotel_id)}`).catch(()=>null)
        ));
        setTrip(p=>{
          const newHotels=[...p.hotels];
          results.forEach((r,idx)=>{
            if(r&&r.success&&r.hotel&&r.hotel.wp_url){
              const targetId=toRefresh[idx].hotel_id;
              const i=newHotels.findIndex(h=>h.hotel_id===targetId);
              if(i>=0) newHotels[i]={...newHotels[i],wp_url:r.hotel.wp_url};
            }
          });
          return {...p,hotels:newHotels};
        });
      })();
    }
  },[apiCall]);

  // ============== BOOTSTRAP: Taxonomien + Tagesarten ==============
  // Reagiert auf API-Settings-Änderungen (wenn User Header tippt → erneut laden)
  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      setBootstrap({status:'pending',error:''});
      const [tax,ta,emo]=await Promise.all([
        apiCall('GET','/taxonomien').catch(e=>({error:e.message,terms:[]})),
        apiCall('GET','/tagesarten').catch(e=>({error:e.message,tagesarten:[]})),
        apiCall('GET','/taxonomien-emotional').catch(e=>({error:e.message,terms:[]}))
      ]);
      if(cancelled) return;

      const grouped={};
      (tax.terms||[]).forEach(t=>{
        if(!t.taxonomy) return;
        if(!grouped[t.taxonomy]) grouped[t.taxonomy]=[];
        grouped[t.taxonomy].push({
          value:t.slug||t.label_de,
          label:t.label_de||t.slug,
          country_code:t.country_code||'',
          is_default:!!t.is_default
        });
      });
      setTaxonomien(grouped);
      setTagesartenList(ta.tagesarten||[]);

      // Emotionale Vokabulare ("Reiseprofil") gruppieren — gleiche Struktur wie /taxonomien.
      // Fehlt/scheitert der Endpoint, bleibt vocEmotional=null und FALLBACK_VOC greift (kein Bootstrap-Fehler).
      if(emo&&!emo.error&&Array.isArray(emo.terms)&&emo.terms.length){
        const ge={};
        emo.terms.forEach(t=>{
          if(!t.taxonomy) return;
          if(!ge[t.taxonomy]) ge[t.taxonomy]=[];
          ge[t.taxonomy].push({value:t.slug||t.label_de,label:t.label_de||t.slug,sort:Number(t.sort)||0});
        });
        Object.keys(ge).forEach(k=>ge[k].sort((a,b)=>a.sort-b.sort));
        const skala=(ge.tonalitaet_skala||[]).map(x=>x.label);
        setVocEmotional({
          persoenlichkeitsfit:ge.persoenlichkeitsfit||null,
          emotionale_wirkung:ge.emotionale_wirkung||null,
          mentale_wirkung:ge.mentale_wirkung||null,
          archetyp:ge.archetyp||null,
          tonalitaet_skala:skala.length?skala:null
        });
      }

      if(tax.error&&ta.error){
        setBootstrap({status:'error',error:`Bootstrap fehlgeschlagen — Taxonomien: ${tax.error} · Tagesarten: ${ta.error}`});
      }else if(tax.error||ta.error){
        setBootstrap({status:'partial',error:`${tax.error?'Taxonomien: '+tax.error:''} ${ta.error?'· Tagesarten: '+ta.error:''}`});
      }else{
        setBootstrap({status:'ok',error:''});
      }
    })();
    return()=>{cancelled=true;};
  },[apiCall]);

  // ============== DRAFT-LOAD (nur einmal beim Mount) ==============
  // Bewusst getrennt vom Bootstrap, damit User-Edits nicht überschrieben werden,
  // wenn Auth-Header oder API-Base später noch geändert werden.
  const[draftLoadTried,setDraftLoadTried]=useState(false);
  useEffect(()=>{
    if(draftLoadTried) return;
    const urlParams=new URLSearchParams(window.location.search);
    const draftIdParam=urlParams.get('entwurf_id');
    if(!draftIdParam){setDraftLoadTried(true);return;}
    // Auf erste echte Auth-Konfig warten — solange sie leer ist, lohnt der Call nicht
    if(!authHeaderValue){return;}
    // Auf Login warten — ohne user_id ist der load-draft-Call sinnlos
    if(!currentUserId){return;}
    let cancelled=false;
    (async()=>{
      try{
        const d=await apiCall('GET',`/load-draft?entwurf_id=${encodeURIComponent(draftIdParam)}&user_id=${encodeURIComponent(currentUserId)}&role=${encodeURIComponent(role)}`);
        if(!cancelled){
          if(d.success&&d.mode==='single'){
            setLoadAccessError('');
            hydrateFromDraft(d);
          }else{
            // v0.13: Bug-Fix — sichtbare Fehlermeldung. entwurfId bleibt leer (Save/Übergeben blockiert),
            // Banner mit Aktionen wird angezeigt.
            setLoadAccessError(d.error||'Entwurf konnte nicht geladen werden.');
          }
        }
      }catch(e){
        if(!cancelled) setLoadAccessError('Verbindungsfehler beim Laden: '+e.message);
        console.warn('Draft-Load fehlgeschlagen:',e.message);
      }
      finally{if(!cancelled) setDraftLoadTried(true);}
    })();
    return()=>{cancelled=true;};
  },[apiCall,authHeaderValue,currentUserId,role,hydrateFromDraft,draftLoadTried]);

  // ============== v0.14.3: WHISPERER-AUTO-LOAD (nur einmal pro Session) ==============
  // Lädt automatisch das Whisperer-Profil des eingeloggten Users beim ersten Render mit currentUserId.
  // - "Profil nicht vorhanden" wird still ignoriert (User legt eines an).
  // - Andere Fehler (Netzwerk, 5xx) werden im Whisperer-Status angezeigt — verschwinden nach 8 Sekunden.
  // - whispererAutoLoadTried verhindert wiederholtes Laden bei Re-Renders.
  const[whispererAutoLoadTried,setWhispererAutoLoadTried]=useState(false);
  useEffect(()=>{
    if(whispererAutoLoadTried) return;
    if(!authHeaderValue) return; // auf Auth-Konfig warten
    if(!currentUserId) return;   // auf Login warten
    let cancelled=false;
    (async()=>{
      try{
        const data=await apiCall('GET','/whisperer-load?user_id='+encodeURIComponent(currentUserId));
        if(cancelled) return;
        if(data.success===false){
          // "Kein Profil" → still ignorieren (User legt eines an).
          if(/Kein Whisperer-Profil/i.test(data.error||'')) return;
          // Andere Backend-Fehler → Hinweis sichtbar machen.
          setWhispererStatus('error');
          setWhispererMsg('Profil konnte nicht automatisch geladen werden — bitte manuell „📥 Profil laden" klicken.');
          setTimeout(()=>setWhispererStatus(null),8000);
          return;
        }
        hydrateWhisperer(data);
        setWhispererStatus('success');
        setWhispererMsg('Profil automatisch geladen.');
        setTimeout(()=>setWhispererStatus(null),4000);
      }catch(err){
        if(cancelled) return;
        setWhispererStatus('error');
        setWhispererMsg('Profil konnte nicht automatisch geladen werden — bitte manuell „📥 Profil laden" klicken.');
        setTimeout(()=>setWhispererStatus(null),8000);
        console.warn('Whisperer-Auto-Load fehlgeschlagen:',err.message);
      }finally{
        if(!cancelled) setWhispererAutoLoadTried(true);
      }
    })();
    return()=>{cancelled=true;};
  },[apiCall,authHeaderValue,currentUserId,whispererAutoLoadTried,hydrateWhisperer]);

  // ============== TAXONOMIE-OPTIONEN (mit lokalem Fallback wenn API leer) ==============
  const taxRegionLand=(taxonomien.region_land&&taxonomien.region_land.length)?taxonomien.region_land:[
    {value:'italien',label:'Italien',country_code:'IT'},
    {value:'spanien',label:'Spanien',country_code:'ES'},
    {value:'griechenland',label:'Griechenland',country_code:'GR'},
    {value:'kroatien',label:'Kroatien',country_code:'HR'},
    {value:'tuerkei',label:'Türkei',country_code:'TR'},
    {value:'portugal',label:'Portugal',country_code:'PT'},
    {value:'frankreich',label:'Frankreich',country_code:'FR'},
    {value:'marokko',label:'Marokko',country_code:'MA'},
    {value:'island',label:'Island',country_code:'IS'},
    {value:'norwegen',label:'Norwegen',country_code:'NO'},
    {value:'japan',label:'Japan',country_code:'JP'},
    {value:'thailand',label:'Thailand',country_code:'TH'},
    {value:'vietnam',label:'Vietnam',country_code:'VN'},
    {value:'peru',label:'Peru',country_code:'PE'},
    {value:'costa-rica',label:'Costa Rica',country_code:'CR'},
    {value:'suedafrika',label:'Südafrika',country_code:'ZA'},
    {value:'oesterreich',label:'Österreich',country_code:'AT'},
    {value:'tschechien',label:'Tschechien',country_code:'CZ'}
  ];
  const taxRegionSub=(taxonomien.region_subregion&&taxonomien.region_subregion.length)?taxonomien.region_subregion:[
    {value:'mittelmeer',label:'Mittelmeer'},{value:'nordeuropa',label:'Nordeuropa'},
    {value:'osteuropa',label:'Osteuropa'},{value:'naher-osten',label:'Naher Osten'},
    {value:'suedostasien',label:'Südostasien'},{value:'ostasien',label:'Ostasien'},
    {value:'amerika',label:'Amerika'},{value:'afrika',label:'Afrika'}
  ];
  // v0.14.1: Reise-Format reduziert auf zwei Werte (Standortreise + Rundreise).
  // Der Whitelist-Filter sorgt dafür, dass Sheet-Daten mit Alt-Slugs (kreuzfahrt, staedtetrip, expedition, retreat, standort)
  // hier ignoriert werden. Steffen pflegt das Sheet entsprechend nach.
  const VALID_REISE_FORMAT=['standortreise','rundreise'];
  const taxReiseFormatRaw=(taxonomien.reise_format&&taxonomien.reise_format.length)?taxonomien.reise_format:[
    {value:'standortreise',label:'Standortreise'},
    {value:'rundreise',label:'Rundreise'}
  ];
  const taxReiseFormat=taxReiseFormatRaw.filter(o=>VALID_REISE_FORMAT.includes(optV(o)));
  const taxReiseThema=(taxonomien.reise_thema&&taxonomien.reise_thema.length)?taxonomien.reise_thema:[
    {value:'kultur-geschichte',label:'Kultur & Geschichte'},
    {value:'natur-landschaft',label:'Natur & Landschaft'},
    {value:'aktiv-sport',label:'Aktiv & Sport'},
    {value:'genuss-kulinarik',label:'Genuss & Kulinarik'},
    {value:'wellness-gesundheit',label:'Wellness & Gesundheit'},
    {value:'begegnung-community',label:'Begegnung & Community'},
    {value:'abenteuer',label:'Abenteuer'},
    {value:'strand-meer',label:'Strand & Meer'}
  ];
  // v0.14.1: Reise-Charakter umbenannt zu Reise-Art mit deutschen Slugs.
  // Werte: erlebnis (Erlebnis-Reise), aktiv (Aktiv-Reise), kulinarik (Kulinarik-Reise), gruppe (Gruppen-Reise, disabled).
  // Whitelist filtert Sheet-Daten mit Alt-Slugs (cultural-exploration, active-travel, gourmet-lifestyle, community-erlebnis).
  const VALID_REISE_ART=['erlebnis','aktiv','kulinarik','gruppe'];
  const taxReiseArtRaw=(taxonomien.reise_charakter&&taxonomien.reise_charakter.length)?taxonomien.reise_charakter:[
    {value:'erlebnis',label:'Erlebnis-Reise'},
    {value:'aktiv',label:'Aktiv-Reise'},
    {value:'kulinarik',label:'Kulinarik-Reise'},
    {value:'gruppe',label:'Gruppen-Reise',disabled:true,title:'Gruppen-Reisen sind in Vorbereitung — diese Auswahl wird bald freigeschaltet.'}
  ];
  const taxReiseArt=taxReiseArtRaw
    .filter(o=>VALID_REISE_ART.includes(optV(o)))
    .map(o=>{
      // Falls "gruppe" aus dem Sheet kommt, ohne disabled-Flag → hier ergänzen.
      if(optV(o)==='gruppe'&&typeof o==='object'&&!o.disabled){
        return {...o,disabled:true,title:'Gruppen-Reisen sind in Vorbereitung — diese Auswahl wird bald freigeschaltet.'};
      }
      return o;
    });
  const taxZielgruppe=(taxonomien.zielgruppe&&taxonomien.zielgruppe.length)?taxonomien.zielgruppe:[
    {value:'solo',label:'Solo-Reisende'},{value:'paare',label:'Paare'},
    {value:'familien',label:'Familien'},{value:'kleingruppen',label:'Kleingruppen'}
  ];
  const taxTierRaw=(taxonomien.tier&&taxonomien.tier.length)?taxonomien.tier:[
    {value:'pdf',label:'PDF (Stufe 1)'},
    {value:'individualreise',label:'Individualreise (Stufe 2)'},
    {value:'gruppenreise',label:'Gruppenreise (Stufe 3)'}
  ];
  // v0.14.7: Aktuell ist nur Stufe 1 (PDF) live. Stufen 2 + 3 werden ausgegraut bis WF3-Erweiterung.
  // Logik gilt unabhängig davon, ob Optionen aus Sheet (taxonomien.tier) oder Fallback kommen.
  const taxTier=taxTierRaw.map(o=>{
    const v=typeof o==='object'?o.value:o;
    if(v==='pdf') return o;
    return{...((typeof o==='object')?o:{value:o,label:o}),disabled:true,title:'kommt später'};
  });
  const tagTypenOpts=tagesartenList.length>0
    ?tagesartenList.map(t=>({value:t.tag_typ,label:t.label_de||t.tag_typ}))
    :['anreisetag','normaltag','aktivtag','kulturtag','strandtag','seetag','transfertag','freier_tag','ausflugstag','wellnesstag','abreisetag'].map(v=>({value:v,label:v}));

  // ============== COUNTRY-CODE LOOKUP ==============
  // v0.14.3: Reihenfolge: (1) Sheet-Wert (taxRegionLand[].country_code), (2) FALLBACK_CC nach
  // normalisiertem Land-Namen. Lookup ist case-/umlaut-/whitespace-tolerant.
  const getCountryCodeForLand=()=>{
    const land=trip.region_land;
    if(!land) return '';
    const found=taxRegionLand.find(o=>o.value===land);
    if(found?.country_code) return found.country_code.toString().toUpperCase().trim();
    const label=found?.label||land;
    return (FALLBACK_CC[normalizeLandName(label)]||'').toUpperCase();
  };

  // ============== HOTEL-SUCHE LOGIK ==============
  const startHotelSearch=async(hi)=>{
    const hotel=trip.hotels[hi];
    const q=(hotel.name||'').trim();
    if(!q){setHS(hi,{phase:'error',error:'Bitte zuerst Hotel-Namen eingeben'});return;}
    const cc=getCountryCodeForLand();
    const ortHint=trip.region_land?(taxRegionLand.find(o=>o.value===trip.region_land)?.label||''):'';
    setHS(hi,{phase:'searching_db',error:'',dbResults:[],placesResults:[]});
    try{
      // hotel_land = Country-Code (z.B. "DE") für DB-Filter
      // hotel_ort wird leer gelassen — wir kennen die Stadt zu diesem Zeitpunkt nicht
      // ortHint (Land-Label) geht nur an Google-Places-Suche als Geo-Bias
      const r=await apiCall('GET',`/hotel-search?hotel_name=${encodeURIComponent(q)}&hotel_land=${encodeURIComponent(cc||'')}`);
      if(r.success&&r.matches&&r.matches.length>0){
        setHS(hi,{phase:'db_results',dbResults:r.matches});
      }else{
        await searchPlaces(hi,q,ortHint);
      }
    }catch(e){setHS(hi,{phase:'error',error:e.message});}
  };

  const searchPlaces=async(hi,name,ortHint)=>{
    setHS(hi,{phase:'searching_places'});
    try{
      const r=await apiCall('GET',`/hotel-places-search?hotel_name=${encodeURIComponent(name)}&hotel_ort=${encodeURIComponent(ortHint||'')}`);
      if(r.success&&r.candidates&&r.candidates.length>0){
        setHS(hi,{phase:'places_results',placesResults:r.candidates});
      }else{
        setHS(hi,{phase:'no_results'});
      }
    }catch(e){setHS(hi,{phase:'error',error:e.message});}
  };

  const pickDbHotel=(hi,match)=>{
    const h=[...trip.hotels];
    h[hi]={...h[hi],hotel_id:match.hotel_id,name:match.hotel_name,adresse:h[hi].adresse||match.hotel_ort||'',wp_url:match.wp_url||''};
    setT('hotels',h);
    setHS(hi,{phase:'done',dbResults:[],placesResults:[]});
  };

  const pickGoogleCandidate=async(hi,cand)=>{
    setHS(hi,{phase:'preparing'});
    const parsed=parseGoogleAddress(cand.address);
    const cc=getCountryCodeForLand();
    const ort=parsed.ort||'';
    const plz=parsed.plz||'';
    if(!cc){setHS(hi,{phase:'error',error:'Country-Code fehlt — bitte Reiseland wählen oder Taxonomie ergänzen'});return;}
    if(!ort){setHS(hi,{phase:'error',error:'Ort konnte nicht aus Google-Adresse geparst werden'});return;}
    try{
      // Duplikat-Schutz: bevor neue Hotel-ID erzeugt wird, prüfen ob das Hotel via google_place_id
      // schon in der WW-DB liegt. Wenn ja, übernehmen wir die existierenden Daten — keine neue ID,
      // kein Stub-Save, keine Analyse. Verhalten dann analog pickDbHotel.
      if(cand.google_place_id){
        try{
          const dup=await apiCall('GET',`/hotel-search?google_place_id=${encodeURIComponent(cand.google_place_id)}`);
          if(dup&&dup.success&&dup.matches&&dup.matches.length>0){
            const m=dup.matches[0];
            const h=[...trip.hotels];
            h[hi]={...h[hi],hotel_id:m.hotel_id,name:m.hotel_name||cand.name,adresse:h[hi].adresse||cand.address||'',wp_url:m.wp_url||''};
            setT('hotels',h);
            setHS(hi,{phase:'done',dbResults:[],placesResults:[]});
            return;
          }
        }catch(dupErr){
          // Wenn der Duplikat-Check fehlschlägt, fahren wir mit dem normalen Flow fort.
          console.warn('Duplikat-Check via google_place_id fehlgeschlagen, fahre mit Neu-Anlage fort:',dupErr.message);
        }
      }
      const idRes=await apiCall('GET',`/hotel-id-next?hotel_land=${encodeURIComponent(cc)}&hotel_ort=${encodeURIComponent(ort)}`);
      if(!idRes.success) throw new Error(idRes.error||'Hotel-ID konnte nicht generiert werden');
      const newHotelId=idRes.next_id;

      // Optimistic Update
      setHS(hi,{phase:'analyzing',analyzing_id:newHotelId,analyzing_name:cand.name});
      const h=[...trip.hotels];
      h[hi]={...h[hi],hotel_id:newHotelId,name:cand.name,adresse:cand.address};
      setT('hotels',h);

      // Stub anlegen (Hotel_ID + Pflichtfelder ins Hotels-Sheet, BEVOR Analyse läuft)
      // → Wenn /hotel-analyse das Mapping verschluckt, findet WF5 die Zeile via name+ort und updated sie.
      // → Wenn Analyse fehlschlägt, bleibt Stub mit status='entwurf' als Wiederaufnahmepunkt.
      try{
        await apiCall('POST','/hotel-save',{
          hotel_id:newHotelId,
          hotel_name:cand.name,
          hotel_ort:ort,
          hotel_land:cc,
          hotel_plz:plz,
          user_id:currentUserId,
          reise_id:''
        });
      }catch(stubErr){
        console.warn('Hotel-Stub konnte nicht angelegt werden, fahre trotzdem mit Analyse fort:',stubErr.message);
      }

      const payload={
        hotel_id:newHotelId,
        hotel_name:cand.name,
        hotel_ort:ort,
        hotel_land:cc,
        hotel_plz:plz,
        google_place_id:cand.google_place_id,
        user_id:currentUserId,
        reise_id:''
      };
      // Fire-and-forget — User kann weiterarbeiten während WF5 läuft
      apiCall('POST','/hotel-analyse',payload).then(r=>{
        if(r&&r.success){
          setHS(hi,{phase:'analyzed',analyzed_at:new Date().toISOString()});
        }else{
          setHS(hi,{phase:'analyze_error',error:(r&&r.error)||'Analyse-Antwort ohne Erfolgsbestätigung'});
        }
      }).catch(e=>{
        setHS(hi,{phase:'analyze_error',error:e.message});
      });
    }catch(e){
      setHS(hi,{phase:'error',error:e.message});
    }
  };

  const cancelHotelSearch=(hi)=>setHS(hi,{phase:'idle',dbResults:[],placesResults:[],error:''});

  // Hotel zurücksetzen (für "Anderes Hotel wählen") — leert IDs/Adresse, behält ref + name + Annotations
  // damit der Such-Button direkt wieder aktiv ist (User kann Namen editieren oder direkt suchen).
  const resetHotel=(hi)=>{
    const cur=trip.hotels[hi];
    if(!confirm(`Hotel ${cur.ref}${cur.name?' ('+cur.name+')':''} entfernen und neu suchen?`)) return;
    const h=[...trip.hotels];
    h[hi]={ref:cur.ref,hotel_id:'',name:cur.name||'',kategorie:'',adresse:'',telefon:'',tipps:cur.tipps||'',naechte:cur.naechte||'',wp_url:''};
    setT('hotels',h);
    setHS(hi,{phase:'idle',dbResults:[],placesResults:[],error:''});
  };

  // Hotel komplett aus dem Pool entfernen
  const removeHotel=(hi)=>{
    const cur=trip.hotels[hi];
    if(!confirm(`Hotel ${cur.ref}${cur.name?' ('+cur.name+')':''} aus der Reise entfernen?`)) return;
    const h=trip.hotels.filter((_,i)=>i!==hi);
    setT('hotels',h);
    // hotelSearch-State für diesen Index ebenfalls bereinigen
    setHotelSearch(p=>{const n={...p};delete n[hi];return n;});
  };

  // Nächster freier Hotel-Ref-Buchstabe (A-Z), nicht length-basiert
  const nextHotelRef=()=>{
    const used=new Set(trip.hotels.map(h=>h.ref));
    for(let c=65;c<=90;c++){const r=String.fromCharCode(c);if(!used.has(r)) return r;}
    return 'Z';
  };

  // ============== BUILD PAYLOAD ==============
  const buildPayload=()=>{
    const params={
      reise_ort:trip.reise_ort,
      anzahl_tage:parseInt(trip.anzahl_tage)||0,
      zielgruppen_alter:'',positionierung:'',
      unterkunft_global:trip.hotels[0]?.name||'',
      phrasen_vermeidung:'',faq_seeds:'',
      image_source_priority:'unsplash',
      wortgrenze_einleitung:250,wortgrenze_normaltag:150,
      wortgrenze_anreisetag:100,wortgrenze_abreisetag:100,
      wortgrenze_freier_tag:100,wortgrenze_fazit:150,
      tage:tage.map(t=>({
        tag_nummer:String(t.tag_nummer),
        tag_ort:t.tag_titel||'',
        tag_beschreibung:t.tag_story||'',
        tag_unterkunft:trip.hotels.find(h=>h.ref===t.hotel_ref)?.name||'',
        // v0.14.3: tag_highlight basiert jetzt auf der nach position sortierten Liste — der erste
